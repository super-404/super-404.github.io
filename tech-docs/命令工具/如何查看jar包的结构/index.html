window.TECH_DOC = {"id":"626e5e97","title":"查看JAR包目录结构（不提取文件）","group":"命令工具","relativePath":"命令工具/如何查看jar包的结构.md","url":"/tech-docs/命令工具/如何查看jar包的结构/","kind":"markdown","markdown":"查看JAR包的结构有多种方法，以下是几种常用的方式：\n\n## 1. 使用 jar 命令（JDK自带）\n\n```bash\n# 查看JAR包目录结构（不提取文件）\njar tf yourfile.jar\n\n# 查看详细的目录结构（包含文件大小和日期）\njar tvf yourfile.jar\n\n# 查看特定路径的内容\njar tf yourfile.jar | grep \"com/example\"\n```\n\n## 2. 使用 unzip 命令（Linux/Mac）\n\n```bash\n# 查看目录结构\nunzip -l yourfile.jar\n\n# 查看并过滤特定文件\nunzip -l yourfile.jar | grep \".class\"\n```\n\n## 3. 使用 GUI 工具\n\n### JD-GUI\n- 开源Java反编译器，可以直观查看JAR包结构\n- 支持直接浏览.class文件的源代码\n\n### IntelliJ IDEA\n- 直接将JAR包作为库添加到项目中\n- 在Project视图中展开External Libraries即可查看\n\n### Eclipse\n- 导入JAR包后，在Package Explorer中查看\n\n## 4. 使用命令行工具（Windows）\n\n```cmd\n# 使用jar命令\njar tf yourfile.jar\n\n# 使用WinRAR或7-Zip\n# 直接右键JAR文件，用压缩软件打开查看\n```\n\n## 5. 编程方式查看（Java代码）\n\n```java\nimport java.util.jar.JarFile;\nimport java.util.Enumeration;\nimport java.util.jar.JarEntry;\n\npublic class JarViewer {\n    public static void main(String[] args) throws Exception {\n        JarFile jarFile = new JarFile(\"yourfile.jar\");\n        Enumeration\u003cJarEntry> entries = jarFile.entries();\n        \n        while (entries.hasMoreElements()) {\n            JarEntry entry = entries.nextElement();\n            System.out.println(entry.getName());\n        }\n        jarFile.close();\n    }\n}\n```\n\n## 实用技巧\n\n```bash\n# 查看JAR包并排序\njar tf yourfile.jar | sort\n\n# 统计文件数量\njar tf yourfile.jar | wc -l\n\n# 只查看.class文件\njar tf yourfile.jar | grep \"\\.class$\"\n\n# 查看MANIFEST.MF文件\nunzip -p yourfile.jar META-INF/MANIFEST.MF\n```\n\n**推荐使用**：对于简单查看，使用 `jar tf` 命令最方便；如果需要详细分析，建议使用JD-GUI等图形化工具。","headings":[{"level":2,"text":"1. 使用 jar 命令（JDK自带）","id":"1.-使用-jar-命令-jdk自带"},{"level":1,"text":"查看JAR包目录结构（不提取文件）","id":"查看jar包目录结构-不提取文件"},{"level":1,"text":"查看详细的目录结构（包含文件大小和日期）","id":"查看详细的目录结构-包含文件大小和日期"},{"level":1,"text":"查看特定路径的内容","id":"查看特定路径的内容"},{"level":2,"text":"2. 使用 unzip 命令（Linux/Mac）","id":"2.-使用-unzip-命令-linux-mac"},{"level":1,"text":"查看目录结构","id":"查看目录结构"},{"level":1,"text":"查看并过滤特定文件","id":"查看并过滤特定文件"},{"level":2,"text":"3. 使用 GUI 工具","id":"3.-使用-gui-工具"},{"level":3,"text":"JD-GUI","id":"jd-gui"},{"level":3,"text":"IntelliJ IDEA","id":"intellij-idea"},{"level":3,"text":"Eclipse","id":"eclipse"},{"level":2,"text":"4. 使用命令行工具（Windows）","id":"4.-使用命令行工具-windows"},{"level":1,"text":"使用jar命令","id":"使用jar命令"},{"level":1,"text":"使用WinRAR或7-Zip","id":"使用winrar或7-zip"},{"level":1,"text":"直接右键JAR文件，用压缩软件打开查看","id":"直接右键jar文件-用压缩软件打开查看"},{"level":2,"text":"5. 编程方式查看（Java代码）","id":"5.-编程方式查看-java代码"},{"level":2,"text":"实用技巧","id":"实用技巧"},{"level":1,"text":"查看JAR包并排序","id":"查看jar包并排序"},{"level":1,"text":"统计文件数量","id":"统计文件数量"},{"level":1,"text":"只查看.class文件","id":"只查看.class文件"},{"level":1,"text":"查看MANIFEST.MF文件","id":"查看manifest.mf文件"}],"excerpt":"查看JAR包的结构有多种方法，以下是几种常用的方式： 1. 使用 jar 命令（JDK自带） 2. 使用 unzip 命令（Linux/Mac） 3. 使用 GUI 工具 JD-GUI - 开源Java反编译器，可以直观查看JAR包结构 - 支持直接浏览.class文件的源代码 IntelliJ IDEA - 直接将JAR包作为库添加到项目中 - 在Proj","isEmpty":false,"wordCount":1430,"updatedAt":"2025-09-26T11:51:24.000Z"};
