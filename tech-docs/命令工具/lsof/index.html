window.TECH_DOC = {"id":"8c57b78a","title":"lsof","group":"命令工具","relativePath":"命令工具/lsof.md","url":"/tech-docs/命令工具/lsof/","kind":"markdown","markdown":"这是 `lsof`（List Open Files）命令的完整帮助输出。`lsof` 是一个功能强大的Unix/Linux工具，用于列出当前系统打开的文件和进程信息。\n\n## 命令概览\n\n**lsof 4.91** - 显示版本号，这是一个相对较新的版本\n\n## 资源信息\n- **最新版本**：普渡大学的FTP服务器\n- **FAQ和手册页**：官方文档位置\n\n## 参数分类解释\n\n### 基本显示控制\n```bash\n-?|-h        # 显示帮助信息\n-t           # 简洁输出（只显示PID）\n-l           # 显示UID数字而非用户名\n-n           # 不解析主机名（显示IP地址）\n-P           # 不解析端口名（显示端口号）\n-v           # 显示版本信息\n-V           # 详细搜索模式\n```\n\n### 选择条件（Selection）\n```bash\n-a           # AND逻辑（默认是OR）\n-u s         # 按用户选择：-u root（root用户）或 -u ^root（排除root）\n-p s         # 按PID选择：-p 123,456 或 -p ^123（排除PID 123）\n-c c         # 按命令名：-c ssh 或 -c ^ssh\n-g s         # 按进程组选择\n```\n\n### 文件类型筛选\n```bash\n-i           # 网络连接：-i TCP, -i :22（端口22）, -i @192.168.1.1\n-U           # Unix域套接字\n-N           # NFS文件\n-d s         # 按文件描述符：-d 0,1,2（标准输入输出错误）\n```\n\n### 目录和文件系统\n```bash\n+d s         # 显示指定目录下打开的文件\n+D D         # 递归显示目录树（较慢）\n+x [fl]      # 跨越文件系统或符号链接\n```\n\n### 输出格式控制\n```bash\n-F [f]       # 指定输出字段：-F pcn（PID、命令名、文件名）\n-o o         # 文件偏移量显示格式\n-s p:s       # 协议状态筛选：-s TCP:ESTABLISHED\n-R           # 显示父进程ID\n```\n\n### 高级功能\n```bash\n+|-r [t]     # 重复模式：+r 15（每15秒刷新，直到无文件）/-r 15（持续刷新）\n-b           # 避免内核阻塞（可能在某些情况下挂起）\n-O           # 无overhead模式（有风险）\n-T fqs       # TCP连接状态详细信息\n```\n\n## 实用示例\n\n```bash\nlsof -i :8090 -P -n 查看大概信息\nps -p 77831  -f  查看详细信息 77831 是具体的pid\nkill -9 77831\n```\n\n## 重要提示\n- **权限**：普通用户只能查看自己有权限的文件\n- **root用户**：可以查看系统所有打开的文件\n- **性能注意**：`+D` 递归目录可能很慢，`-O` 选项有风险\n\n这个工具在系统调试、性能分析和安全审计中非常有用。\n\n常用命令\n\n\n","headings":[{"level":2,"text":"命令概览","id":"命令概览"},{"level":2,"text":"资源信息","id":"资源信息"},{"level":2,"text":"参数分类解释","id":"参数分类解释"},{"level":3,"text":"基本显示控制","id":"基本显示控制"},{"level":3,"text":"选择条件（Selection）","id":"选择条件-selection"},{"level":3,"text":"文件类型筛选","id":"文件类型筛选"},{"level":3,"text":"目录和文件系统","id"
