window.TECH_DOC = {"id":"b90f30bd","title":"崩溃恢复","group":"分布式技术","relativePath":"分布式技术/Mit6.824/mapReduce.md","url":"/tech-docs/分布式技术/mit6.824/mapreduce/","kind":"markdown","markdown":"是的，但这句话**要分两层理解**，不然很容易混淆（6.5840 里这是一个“考点级别”的概念）。\n\n------\n\n## 一句话先给结论\n\n> **Map 和 Reduce 的“具体计算逻辑”是在 worker 中执行的，\n> 但 MapReduce 的“调度与流程控制”是在 coordinator 中完成的。**\n\n换句话说：\n\n| 角色            | 负责什么                                   |\n| --------------- | ------------------------------------------ |\n| **worker**      | 真正执行 `Map()` 和 `Reduce()` 函数        |\n| **coordinator** | 分配任务、跟踪状态、容错、决定什么时候结束 |\n\n------\n\n## 一、Map / Reduce 函数本身是谁实现的？\n\n### 1️⃣ Map / Reduce 不是你写的（实验角度）\n\n在 6.5840 里：\n\n```go\nfunc Map(filename string, contents string) []mr.KeyValue\nfunc Reduce(key string, values []string) string\n```\n\n这些函数：\n\n- **不在 worker.go**\n- 在 `mrapps/*.go` 里（如 `wc.go`、`indexer.go`）\n- 被编译成 **plugin（.so 文件）**\n\n例如：\n\n```go\n../mrworker ../../mrapps/wc.so\n```\n\n👉 worker **动态加载**这些函数。\n\n------\n\n### 2️⃣ worker 如何“拿到” Map / Reduce？\n\n在 `mrworker.go` 的 `main()` 里：\n\n```go\nmapf, reducef := loadPlugin(os.Args[1])\nWorker(mapf, reducef)\n```\n\n然后：\n\n```go\nfunc Worker(\n    mapf func(string, string) []KeyValue,\n    reducef func(string, []string) string,\n)\n```\n\n👉 **worker 拿到的是函数指针**\n\n------\n\n## 二、Map / Reduce 是在哪里“被调用”的？\n\n### ✅ 是在 worker 中调用的（重点）\n\n#### Map 阶段（在 worker）\n\n```go\nkva := mapf(filename, contents)\n```\n\n#### Reduce 阶段（在 worker）\n\n```go\noutput := reducef(key, values)\n```\n\n👉 **真正的计算发生在 worker 进程里**\n\n------\n\n## 三、Coordinator 做了什么（不是计算）\n\nCoordinator **从来不调用 mapf / reducef**。\n\n它只做：\n\n- 记录有哪些 Map / Reduce 任务\n- 通过 RPC 告诉 worker：\n  - “你去做第 X 个 Map”\n  - “你去做第 Y 个 Reduce”\n- 追踪任务状态（Idle / InProgress / Done）\n- 超时重发任务\n- 判断 `Done()`\n\n可以理解为：\n\n> **coordinator 是“项目经理”，worker 是“码农”**\n\n------\n\n## 四、用一个完整流程串起来（非常重要）\n\n### ① coordinator 启动\n\n```text\n初始化 Map 任务\n初始化 Reduce 任务\nPhase = Map\n```\n\n------\n\n### ② worker 启动\n\n```text\nworker -> RPC: 给我一个任务\n```\n\n------\n\n### ③ coordinator 分配 Map 任务\n\n```text\n回复：MapTask { file=pg-xxx.txt }\n```\n\n------\n\n### ④ worker 执行 Map（核心）\n\n```go\ncontents := readFile(file)\nkva := mapf(file, contents)   // ⭐ 这里才是真正的 Map\n写 mr-X-Y 中间文件\nRPC 告诉 coordinator：Map 完成\n```\n\n------\n\n### ⑤ coordinator 切换到 Reduce 阶段\n\n```text\n所有 Map 完成 → Phase = Reduce\n```\n\n------\n\n### ⑥ worker 执行 Reduce\n\n```go\n读取所有 mr-X-Y\n排序\noutput := reducef(key, values)  // ⭐ 这里才是真正的 Reduce\n写 mr-out-Y\nRPC 告诉 coordinator：Reduce 完成\n```\n\n------\n\n### ⑦ coordinator Done() 返回 true\n\n```text\nPhase = Done\ncoordinator 退出\nworker RPC 失败 → worker 退出\n```\n\n------\n\n## 五、一个非常容易犯的误区（重点提醒）\n\n❌ **错误理解**\n\n> “Map / Reduce 是 coordinator 调用的”\n\n这是错的 ❌\ncoordinator **不参与任何数据计算**\n\n------\n\n✅ **正确理解**\n\n> **Map / Reduce 是 worker 执行的，coordinator 只负责调度**\n\n------\n\n## 六、用 Java / 分布式系统类比一下（帮你建立直觉）\n\n| MapReduce 角色 | Java / 分布式类比             |\n| -------------- | ----------------------------- |\n| coordinator    | JobTracker / Master           |\n| worker         | TaskExecutor / WorkerNode     |\n| Map / Reduce   | 业务函数（lambda / callback） |\n| RPC            | gRPC / RMI                    |\n| plugin         | SPI / 动态加载 jar            |\n\n------\n\n## 七、为什么这点和你“卡住”的问题强相关？\n\n你现在的卡死现象很可能是：\n\n- worker **执行了 Map**\n- 但 **没有正确向 coordinator 报告完成**\n- coordinator **认为任务没做完**\n- `Done()` 永远 false\n\n👉 **不是 Map/Reduce 没跑，是“跑完没人告诉老板”**\n\n------\n\n## 八、一句话终极总结（建议记住）\n\n> **Map / Reduce 的“算法”在 plugin 里，\n> Map / Reduce 的“执行”在 worker 里，\n> Map / Reduce 的“调度与结束判断”在 coordinator 里。**\n\n------\n\n如果你愿意，下一步我可以直接：\n\n- 给你画一张 **worker / coordinator RPC 交互时序图**\n- 或帮你 **对照 test-mr.sh 一条一条实现 coordinator 的状态机**\n\n你现在已经理解到 **6.5840 最核心的抽象层次了** 👏\n\n\n\n# 崩溃恢复\n\n分析 worker 崩溃恢复机制。先查看相关代码，理解当前实现：\n\n[4 tools called]\n\n\n分析当前实现并提出 worker 崩溃恢复方案：\n\n[1 tool called]\n\n\n## Worker 崩溃恢复方案\n\n### 当前问题分析\n\n1. 无任务状态跟踪：coordinator 分配任务后，不记录任务状态（未分配/已分配/已完成）\n2. 无 worker 关联：不知道哪个 worker 在处理哪个任务\n3. 无超时检测：无法判断 worker 是否崩溃\n4. 任务丢失：worker 崩溃后，任务无法重新分配\n\n### 恢复方案设计\n\n#### 1. 任务状态管理\n\n在 `Coordinator` 中添加：\n\n```go\ntype Coordinator struct {\n    // ... 现有字段 ...\n    \n    // Map 任务管理\n    mapTasks map[string]*MapTask  // key: 文件名, value: 任务信息\n    \n    // Reduce 任务管理\n    reduceTasks map[int]*ReduceTask  // key: reduce task num, value: 任务信息\n}\n\ntype MapTask struct {\n    FileName    string\n    Status      string  // \"pending\", \"assigned\", \"completed\"\n    AssignedTo  int     // worker ID\n    AssignedAt  time.Time\n}\n\ntype ReduceTask struct {\n    TaskNum     int\n    Status      string  // \"pending\", \"assigned\", \"completed\"\n    AssignedTo  int     // worker ID\n    AssignedAt  time.Time\n}\n```\n\n#### 2. 超时检测机制\n\n- 启动后台 goroutine，定期检查任务超时（如每 1 秒）\n- 超时阈值：10 秒（可配置）\n- 超时处理：将任务状态从 \"assigned\" 重置为 \"pending\"，允许重新分配\n\n#### 3. 任务分配逻辑修改\n\n- Map 任务：\n  - 从 `mapTasks` 中查找状态为 \"pending\" 的任务\n  - 分配时设置状态为 \"assigned\"，记录 worker ID 和分配时间\n  - 完成时设置状态为 \"completed\"\n\n- Reduce 任务：\n  - 类似 Map 任务的管理方式\n  - 从 `reduceTasks` 中查找状态为 \"pending\" 的任务\n\n#### 4. 任务完成验证\n\n- 在 `TaskDone` 中验证：\n  - 任务确实被分配给该 worker\n  - 任务状态是 \"assigned\"\n  - 防止重复完成计数\n\n#### 5. 中间文件清理\n\n- 重新分配 Map 任务前，删除可能不完整的中间文件（`mr-X-Y`）\n- 重新分配 Reduce 任务前，确保所有 Map 任务已完成\n\n### 实现步骤\n\n1. 修改 `Coordinator` 结构体：添加任务状态跟踪字段\n2. 修改 `MakeCoordinator`：初始化任务状态\n3. 修改 `assignMapTask`：从任务状态中分配，而不是直接从 `fileList`\n4. 修改 `assignReduceTask`：从任务状态中分配\n5. 修改 `TaskDone`：更新任务状态，验证任务有效性\n6. 添加超时检测 goroutine：定期检查并重置超时任务\n7. 添加任务清理逻辑：重新分配前清理不完整的文件\n\n### 关键设计点\n\n1. 超时时间：10 秒（可配置，需覆盖 crash.go 的最大延迟）\n2. 并发安全：所有状态修改需加锁\n3. 幂等性：任务完成可重复报告，但只计数一次\n4. 文件清理：重新分配前删除可能不完整的中间文件\n\n### 预期效果\n\n- Worker 崩溃后，任务会在超时后自动重新分配\n- 新 worker 可以接管崩溃 worker 的任务\n- 系统能够从 worker 崩溃中恢复，完成所有任务\n- 通过 crash test\n\n需要我开始实现吗？","headings":[{"level":2,"text":"一句话先给结论","id":"一句话先给结论"},{"level":2,"text":"一、Map / Reduce 函数本身是谁实现的？","id":"一-map---reduce-函数本身是谁实现的"},{"level":3,"text":"1️⃣ Map / Reduce 不是你写的（实验角度）","id":"1--map---reduce-不是你写的-实验角度"},{"level":3,"text":"2️⃣ worker 如何“拿到” Map / Reduce？","id":"2--worker-如何-拿到--map---reduce"},{"level":2,"text":"二、Map / Reduce 是在哪里“被调用”的？","id":"二-map---reduce-是在哪里-被调用-的"},{"level":3,"text":"✅ 是在 worker 中调用的（重点）","id":"是在-worker-中调用的-重点"},{"level":2,"text":"三、Coordinator 做了什么（不是计算）","id":"三-coordinator-做了什么-不是计算"},{"level":2,"text":"四、用一个完整流程串起来（非常重要）","id":"四-用一个完整流程串起来-非常重要"},{"level":3,"text":"① coordinator 启动","id":"1-coordinator-启动"},{"level":3,"text":"② worker 启动","id":"2-worker-启动"},{"level":3,"text":"③ coordinator 分配 Map 任务","id":"3-coordinator-分配-map-任务"},{"level":3,"text":"④ worker 执行 Map（核心）","id":"4-worker-执行-map-核心"},{"level":3,"text":"⑤ coordinator 切换到 Reduce 阶段","id":"5-coordinator-切换到-reduce-阶段"},{"level":3,"text":"⑥ worker 执行 Reduce","id":"6-worker-执行-reduce"},{"level":3,"text":"⑦ coordinator Done() 返回 true","id":"7-coordinator-done--返回-true"},{"level":2,"text":"五、一个非常容易犯的误区（重点提醒）","id":"五-一个非常容易犯的误区-重点提醒"},{"level":2,"text":"六、用 Java / 分布式系统类比一下（帮你建立直觉）","id":"六-用-java---分布式系统类比一下-帮你建立直觉"},{"level":2,"text":"七、为什么这点和你“卡住”的问题强相关？","id":"七-为什么这点和你-卡住-的问题强相关"},{"level":2,"text":"八、一句话终极总结（建议记住）","id":"八-一句话终极总结-建议记住"},{"level":1,"text":"崩溃恢复","id":"崩溃恢复"},{"level":2,"text":"Worker 崩溃恢复方案","id":"worker-崩溃恢复方案"},{"level":3,"text":"当前问题分析","id":"当前问题分析"},{"level":3,"text":"恢复方案设计","id":"恢复方案设计"},{"level":3,"text":"实现步骤","id":"实现步骤"},{"level":3,"text":"关键设计点","id":"关键设计点"},{"level":3,"text":"预期效果","id":"预期效果"}],"excerpt":"是的，但这句话要分两层理解，不然很容易混淆（6.5840 里这是一个“考点级别”的概念）。 ------ 一句话先给结论 Map 和 Reduce 的“具体计算逻辑”是在 worker 中执行的， 但 MapReduce 的“调度与流程控制”是在 coordinator 中完成的。 换句话说： ------ 一、Map / Reduce 函数本身是谁实现的？","isEmpty":false,"wordCount":5239,"updatedAt":"2026-01-08T06:25:14.000Z"};
