window.TECH_DOC = {"id":"ac7a2bb7","title":"Redis连接工厂和配置对比","group":"开源学习","relativePath":"开源学习/redis/redis三个工厂的区别.md","url":"/tech-docs/开源学习/redis/redis三个工厂的区别/","kind":"markdown","markdown":"# Redis连接工厂和配置对比\n\n这四个组件在Spring Data Redis中扮演不同的角色，我来详细解释它们的区别：\n\n## 1. JedisPoolConfig\n**角色**: 连接池配置对象（不是连接工厂）\n**用途**: 配置Jedis客户端的连接池参数\n```java\n@Bean\npublic JedisPoolConfig jedisPoolConfig() {\n    JedisPoolConfig poolConfig = new JedisPoolConfig();\n    poolConfig.setMaxTotal(10);      // 最大连接数\n    poolConfig.setMaxIdle(5);        // 最大空闲连接\n    poolConfig.setMinIdle(2);        // 最小空闲连接\n    poolConfig.setMaxWait(Duration.ofSeconds(3)); // 最大等待时间\n    return poolConfig;\n}\n```\n\n## 2. JedisConnectionFactory\n**基于**: Jedis客户端（阻塞式I/O）\n**特点**: \n- 阻塞式操作\n- 连接池支持完善\n- 线程不安全，需要连接池\n- 传统且稳定\n\n```java\n@Bean\npublic JedisConnectionFactory jedisConnectionFactory(JedisPoolConfig poolConfig) {\n    JedisConnectionFactory factory = new JedisConnectionFactory(poolConfig);\n    factory.setHostName(\"localhost\");\n    factory.setPort(6379);\n    factory.setPassword(\"password\");\n    return factory;\n}\n```\n\n## 3. LettuceConnectionFactory\n**基于**: Lettuce客户端（Netty NIO）\n**特点**:\n- 非阻塞异步IO\n- 高性能，支持响应式编程\n- 线程安全，单个连接可多线程共享\n- 支持集群、哨兵模式更好\n- Spring Boot 2.x+ 默认客户端\n\n```java\n@Bean\npublic LettuceConnectionFactory lettuceConnectionFactory() {\n    RedisStandaloneConfiguration config = new RedisStandaloneConfiguration();\n    config.setHostName(\"localhost\");\n    config.setPort(6379);\n    config.setPassword(\"password\");\n    return new LettuceConnectionFactory(config);\n}\n```\n\n## 4. RedissonConnectionFactory\n**基于**: Redisson客户端（Netty NIO）\n**特点**:\n- 不仅仅是连接工厂，是完整的分布式服务框架\n- 提供丰富的分布式功能（锁、集合、服务等）\n- 支持多种编解码器\n- 适合复杂的分布式系统场景\n\n```java\n@Bean\npublic RedissonConnectionFactory redissonConnectionFactory(RedissonClient redissonClient) {\n    return new RedissonConnectionFactory(redissonClient);\n}\n\n@Bean\npublic RedissonClient redissonClient() {\n    Config config = new Config();\n    config.useSingleServer()\n          .setAddress(\"redis://localhost:6379\")\n          .setPassword(\"password\");\n    return Redisson.create(config);\n}\n```\n\n## 对比总结\n\n| 特性           | JedisConnectionFactory | LettuceConnectionFactory | RedissonConnectionFactory |\n| -------------- | ---------------------- | ------------------------ | ------------------------- |\n| **底层客户端** | Jedis                  | Lettuce                  | Redisson                  |\n| **I/O模型**    | 阻塞式                 | 非阻塞NIO                | 非阻塞NIO                 |\n| **线程安全**   | 不安全，需要连接池     | 安全，可共享连接         | 安全                      |\n| **性能**       | 一般                   | 高                       | 高                        |\n| **功能范围**   | 基本Redis操作          | 基本Redis操作+响应式     | 完整的分布式服务          |\n| **使用场景**   | 传统应用，简单场景     | 高并发，现代应用         | 分布式系统，复杂场景      |\n| **配置依赖**   | 需要JedisPoolConfig    | 无需额外连接池配置       | 需要RedissonClient        |\n\n## 选择建议\n\n- **简单应用**: JedisConnectionFactory + JedisPoolConfig\n- **高性能现代应用**: LettuceConnectionFactory（Spring Boot默认）\n- **分布式系统**: RedissonConnectionFactory + RedissonClient\n\n## 配置示例\n\n```yaml\n# application.yml\nspring:\n  redis:\n    host: localhost\n    port: 6379\n    password: your_password\n    lettuce:\n      pool:\n        max-active: 8\n        max-idle: 8\n        min-idle: 0\n    jedis:\n      pool:\n        max-active: 8\n        max-idle: 8\n        min-idle: 0\n```\n\n现代Spring Boot项目通常推荐使用Lettuce作为默认客户端。","headings":[{"level":1,"text":"Redis连接工厂和配置对比","id":"redis连接工厂和配置对比"},{"level":2,"text":"1. JedisPoolConfig","id":"1.-jedispoolconfig"},{"level":2,"text":"2. JedisConnectionFactory","id":"2.-jedisconnectionfactory"},{"level":2,"text":"3. LettuceConnectionFactory","id":"3.-lettuceconnectionfactory"},{"level":2,"text":"4. RedissonConnectionFactory","id":"4.-redissonconnectionfactory"},{"level":2,"text":"对比总结","id":"对比总结"},{"level":2,"text":"选择建议","id":"选择建议"},{"level":2,"text":"配置示例","id":"配置示例"},{"level":1,"text":"application.yml","id":"application.yml"}],"excerpt":"Redis连接工厂和配置对比 这四个组件在Spring Data Redis中扮演不同的角色，我来详细解释它们的区别： 1. JedisPoolConfig 角色: 连接池配置对象（不是连接工厂） 用途: 配置Jedis客户端的连接池参数 2. JedisConnectionFactory 基于: Jedis客户端（阻塞式I/O） 特点: - 阻塞式操作 -","isEmpty":false,"wordCount":3177,"updatedAt":"2025-09-01T06:33:15.000Z"};
