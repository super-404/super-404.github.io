window.TECH_DOC = {"id":"87e91bab","title":"JobScheduleHelper 详解","group":"开源学习","relativePath":"开源学习/Xxl-job/JobScheduleHelper详解.md","url":"/tech-docs/开源学习/xxl-job/jobschedulehelper详解/","kind":"markdown","markdown":"# JobScheduleHelper 详解\n\n## 📋 目录\n1. [核心架构](#核心架构)\n2. [双线程机制](#双线程机制)\n3. [时间轮（Time Ring）机制](#时间轮机制)\n4. [调度流程详解](#调度流程详解)\n5. [关键代码解析](#关键代码解析)\n\n---\n\n## 🏗️ 核心架构\n\n### 整体架构图\n\n```\n┌─────────────────────────────────────────────────────────────┐\n│                    JobScheduleHelper                        │\n├─────────────────────────────────────────────────────────────┤\n│                                                             │\n│  ┌──────────────────┐         ┌──────────────────┐       │\n│  │  scheduleThread  │         │    ringThread     │       │\n│  │  (调度线程)       │         │   (时间轮线程)     │       │\n│  └────────┬─────────┘         └────────┬─────────┘       │\n│           │                            │                  │\n│           │ 扫描任务                    │ 触发任务          │\n│           │                            │                  │\n│           ▼                            ▼                  │\n│  ┌──────────────────────────────────────────┐            │\n│  │         ringData (时间轮数据)              │            │\n│  │  Map\u003cInteger, List\u003cInteger>>              │            │\n│  │  key: 秒数(0-59)                          │            │\n│  │  value: 该秒需要触发的任务ID列表           │            │\n│  └──────────────────────────────────────────┘            │\n│                                                             │\n└─────────────────────────────────────────────────────────────┘\n```\n\n---\n\n## 🔄 双线程机制\n\n### 线程职责分工\n\n```\n┌─────────────────────────────────────────────────────────────┐\n│                    scheduleThread                          │\n│                  (调度线程 - 生产者)                        │\n├─────────────────────────────────────────────────────────────┤\n│  1. 每1秒扫描一次数据库                                     │\n│  2. 查询未来5秒内需要执行的任务                             │\n│  3. 根据任务状态分类处理：                                  │\n│     - 过期 > 5秒：处理 misfire，更新下次执行时间            │\n│     - 过期 \u003c 5秒：立即触发，放入时间轮                      │\n│     - 未过期：放入时间轮                                    │\n│  4. 更新任务的 triggerNextTime                             │\n└─────────────────────────────────────────────────────────────┘\n                            │\n                            │ pushTimeRing()\n                            ▼\n┌─────────────────────────────────────────────────────────────┐\n│                    ringData (时间轮)                        │\n│  ┌─────┬─────┬─────┬─────┬─────┬─────┬─────┐            │\n│  │  0  │  1  │  2  │ ... │ 30  │ ... │ 59  │            │\n│  ├─────┼─────┼─────┼─────┼─────┼─────┼─────┤            │\n│  │[1,3]│ [2] │ [5] │ ... │[1,4]│ ... │ [6] │            │\n│  └─────┴─────┴─────┴─────┴─────┴─────┴─────┘            │\n│  秒数   任务ID列表                                          │\n└─────────────────────────────────────────────────────────────┘\n                            │\n                            │ remove()\n                            ▼\n┌─────────────────────────────────────────────────────────────┐\n│                    ringThread                               │\n│                  (时间轮线程 - 消费者)                       │\n├─────────────────────────────────────────────────────────────┤\n│  1. 每1秒执行一次                                           │\n│  2. 对齐到整秒（sleep到下一个整秒）                          │\n│  3. 取出当前秒及前2秒的任务（避免遗漏）                      │\n│  4. 去重处理（避免重复触发）                                 │\n│  5. 批量触发任务                                            │\n└─────────────────────────────────────────────────────────────┘\n```\n\n---\n\n## ⏰ 时间轮（Time Ring）机制\n\n### 时间轮结构\n\n```\n时间轮是一个 Map\u003cInteger, List\u003cInteger>> 结构：\n\nringData = {\n    0:  [jobId1, jobId2],    // 第0秒需要触发的任务\n    1:  [jobId3],            // 第1秒需要触发的任务\n    2:  [jobId4, jobId5],    // 第2秒需要触发的任务\n    ...\n    30: [jobId1, jobId6],    // 第30秒需要触发的任务\n    ...\n    59: [jobId7]             // 第59秒需要触发的任务\n}\n```\n\n### 时间轮工作原理\n\n```\n当前时间：10:30:25.500\n\n时间轮状态：\n┌─────┬─────┬─────┬─────┬─────┬─────┬─────┐\n│ 25  │ 26  │ 27  │ 28  │ 29  │ 30  │ 31  │  ← 秒数\n├─────┼─────┼─────┼─────┼─────┼─────┼─────┤\n│ [1] │ [2] │ [3] │ [4] │ [5] │ [6] │ [7] │  ← 任务ID列表\n└─────┴─────┴─────┴─────┴─────┴─────┴─────┘\n\nringThread 在 10:30:26.000 时：\n1. 取出第26秒的任务：[2]\n2. 同时取出前2秒（24, 25）的任务，避免遗漏\n3. 去重后触发：[1, 2]\n```\n\n---\n\n## 📊 调度流程详解\n\n### 调度线程（scheduleThread）流程图\n\n```\n开始\n  │\n  ▼\n对齐时间（sleep到整秒）\n  │\n  ▼\n┌─────────────────────────────────┐\n│  开启数据库事务                  │\n│  获取调度锁（避免重复调度）       │\n└─────────────────────────────────┘\n  │\n  ▼\n查询未来5秒内需要执行的任务\n  │\n  ▼\n┌─────────────────────────────────┐\n│  遍历任务列表                    │\n└─────────────────────────────────┘\n  │\n  ▼\n判断任务状态\n  │\n  ├─────────────────┬─────────────────┬─────────────────┐\n  │                 │                 │                 │\n  ▼                 ▼                 ▼                 ▼\n过期>5秒          过期\u003c5秒          未过期            其他\n  │                 │                 │                 │\n  ▼                 ▼                 ▼                 ▼\n处理misfire      立即触发          放入时间轮         跳过\n  │                 │                 │                 │\n  ▼                 │                 │                 │\n更新下次时间       │                 │                 │\n  │                 │                 │                 │\n  └─────────────────┴─────────────────┴─────────────────┘\n                    │\n                    ▼\n              更新任务信息到数据库\n                    │\n                    ▼\n              提交事务\n                    │\n                    ▼\n              等待到下一个整秒\n                    │\n                    ▼\n                  循环\n```\n\n### 任务状态判断逻辑\n\n```\n当前时间：nowTime = 10:30:25.500\n任务下次执行时间：triggerNextTime = 10:30:20.000\n\n判断逻辑：\n┌─────────────────────────────────────────────────────┐\n│  if (nowTime > triggerNextTime + 5000)              │\n│      → 过期超过5秒                                    │\n│      → 处理 misfire，更新下次执行时间                │\n├─────────────────────────────────────────────────────┤\n│  else if (nowTime > triggerNextTime)                │\n│      → 过期但小于5秒                                  │\n│      → 立即触发，同时放入时间轮                      │\n├─────────────────────────────────────────────────────┤\n│  else                                                │\n│      → 未过期（预读）                                │\n│      → 放入时间轮                                    │\n└─────────────────────────────────────────────────────┘\n```\n\n---\n\n## 🎯 时间轮线程（ringThread）流程图\n\n```\n开始\n  │\n  ▼\n对齐到整秒（sleep到下一个整秒）\n  │\n  ▼\n获取当前秒数（0-59）\n  │\n  ▼\n┌─────────────────────────────────┐\n│  收集时间轮数据                  │\n│  - 当前秒的任务                  │\n│  - 前1秒的任务（避免遗漏）        │\n│  - 前2秒的任务（避免遗漏）        │\n└─────────────────────────────────┘\n  │\n  ▼\n去重处理（避免重复触发）\n  │\n  ▼\n批量触发任务\n  │\n  ▼\n清空已处理的数据\n  │\n  ▼\n等待到下一个整秒\n  │\n  ▼\n循环\n```\n\n### 时间轮收集逻辑\n\n```java\n// 当前秒数：30\nint nowSecond = 30;\n\n// 收集当前秒及前2秒的任务（避免处理耗时导致遗漏）\nfor (int i = 0; i \u003c= 2; i++) {\n    int ringSecond = (nowSecond + 60 - i) % 60;\n    // i=0: 30秒\n    // i=1: 29秒\n    // i=2: 28秒\n    List\u003cInteger> ringItemList = ringData.remove(ringSecond);\n    ringItemData.addAll(ringItemList);\n}\n```\n\n---\n\n## 🔍 关键代码解析\n\n### 1. 调度线程核心逻辑\n\n```java\n// 预读时间：5秒\npublic static final long PRE_READ_MS = 5000;\n\n// 预读数量：线程池大小 * 10\nint preReadCount = (fastMax + slowMax) * 10;\n\n// 查询未来5秒内需要执行的任务\nList\u003cXxlJobInfo> scheduleList = \n    scheduleJobQuery(nowTime + PRE_READ_MS, preReadCount);\n```\n\n### 2. 三种任务处理场景\n\n#### 场景1：过期超过5秒\n```java\nif (nowTime > jobInfo.getTriggerNextTime() + PRE_READ_MS) {\n    // 处理 misfire（错过调度）\n    MisfireStrategyEnum misfireStrategyEnum = \n        MisfireStrategyEnum.match(jobInfo.getMisfireStrategy(), \n                                  MisfireStrategyEnum.DO_NOTHING);\n    misfireStrategyEnum.getMisfireHandler().handle(jobInfo.getId());\n    \n    // 更新下次执行时间\n    refreshNextTriggerTime(jobInfo, new Date());\n}\n```\n\n#### 场景2：过期但小于5秒\n```java\nelse if (nowTime > jobInfo.getTriggerNextTime()) {\n    // 立即触发\n    trigger(jobInfo.getId(), TriggerTypeEnum.CRON, -1, null, null, null);\n    \n    // 更新下次执行时间\n    refreshNextTriggerTime(jobInfo, new Date());\n    \n    // 如果下次执行时间在5秒内，预读放入时间轮\n    if (jobInfo.getTriggerStatus() == RUNNING && \n        nowTime + PRE_READ_MS > jobInfo.getTriggerNextTime()) {\n        int ringSecond = (int)((jobInfo.getTriggerNextTime()/1000)%60);\n        pushTimeRing(ringSecond, jobInfo.getId());\n        refreshNextTriggerTime(jobInfo, new Date(jobInfo.getTriggerNextTime()));\n    }\n}\n```\n\n#### 场景3：未过期（正常预读）\n```java\nelse {\n    // 放入时间轮\n    int ringSecond = (int)((jobInfo.getTriggerNextTime()/1000)%60);\n    pushTimeRing(ringSecond, jobInfo.getId());\n    \n    // 更新下次执行时间\n    refreshNextTriggerTime(jobInfo, new Date(jobInfo.getTriggerNextTime()));\n}\n```\n\n### 3. 时间轮推送\n\n```java\nprivate void pushTimeRing(int ringSecond, int jobId) {\n    // 获取或创建该秒的任务列表\n    List\u003cInteger> ringItemList = ringData.computeIfAbsent(\n        ringSecond,\n        k -> new ArrayList\u003c>()\n    );\n    \n    // 添加任务ID\n    ringItemList.add(jobId);\n}\n```\n\n### 4. 时间轮触发\n\n```java\n// 获取当前秒数\nint nowSecond = Calendar.getInstance().get(Calendar.SECOND);\n\n// 收集当前秒及前2秒的任务\nfor (int i = 0; i \u003c= 2; i++) {\n    List\u003cInteger> ringItemList = ringData.remove((nowSecond + 60 - i) % 60);\n    if (ringItemList != null) {\n        // 去重\n        List\u003cInteger> distinct = ringItemList.stream().distinct().toList();\n        ringItemData.addAll(distinct);\n    }\n}\n\n// 批量触发\nfor (int jobId : ringItemData) {\n    trigger(jobId, TriggerTypeEnum.CRON, -1, null, null, null);\n}\n```\n\n---\n\n## ⏱️ 时序图\n\n```\n时间轴：10:30:20 → 10:30:25 → 10:30:26\n\nscheduleThread          ringData              ringThread\n     │                     │                      │\n     │ 扫描任务             │                      │\n     │────────────────────>│                      │\n     │                     │                      │\n     │ 发现任务A在10:30:26执行                     │\n     │────────────────────>│                      │\n     │  pushTimeRing(26, A)│                      │\n     │                     │                      │\n     │                     │  [26: [A]]          │\n     │                     │                      │\n     │                     │                      │ 10:30:26.000\n     │                     │                      │ 对齐到整秒\n     │                     │                      │\n     │                     │\u003c─────────────────────│\n     │                     │  remove(26)         │\n     │                     │                      │\n     │                     │                      │ 触发任务A\n     │                     │                      │\n     │                     │                      │\n```\n\n---\n\n## 🎨 设计亮点\n\n### 1. 预读机制\n- **提前5秒扫描**：避免实时查询数据库压力\n- **批量处理**：一次查询处理多个任务\n\n### 2. 时间轮机制\n- **精确到秒**：60个槽位对应60秒\n- **高效触发**：O(1)时间复杂度取任务\n\n### 3. 容错机制\n- **向前校验2秒**：避免处理耗时导致遗漏\n- **去重处理**：避免重复触发\n- **Misfire处理**：处理过期任务\n\n### 4. 事务保护\n- **数据库锁**：避免多实例重复调度\n- **事务提交**：保证数据一致性\n\n---\n\n## 📝 总结\n\n`JobScheduleHelper` 通过**双线程 + 时间轮**的机制，实现了高效、精确的任务调度：\n\n1. **scheduleThread**：负责扫描和预读，将任务放入时间轮\n2. **ringThread**：负责精确触发，从时间轮取出任务执行\n3. **时间轮**：作为缓冲区，实现秒级精确调度\n\n这种设计既保证了调度的精确性，又避免了频繁查询数据库，是一个优秀的设计方案。\n\n","headings":[{"level":1,"text":"JobScheduleHelper 详解","id":"jobschedulehelper-详解"},{"level":2,"text":"📋 目录","id":"目录"},{"level":2,"text":"🏗️ 核心架构","id":"核心架构"},{"level":3,"text":"整体架构图","id":"整体架构图"},{"level":2,"text":"🔄 双线程机制","id":"双线程机制"},{"level":3,"text":"线程职责分工","id":"线程职责分工"},{"level":2,"text":"⏰ 时间轮（Time Ring）机制","id":"时间轮-time-ring-机制"},{"level":3,"text":"时间轮结构","id":"时间轮结构"},{"level
