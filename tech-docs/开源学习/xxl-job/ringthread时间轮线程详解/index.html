window.TECH_DOC = {"id":"3a36fd5e","title":"ringThread 时间轮线程详解","group":"开源学习","relativePath":"开源学习/Xxl-job/ringThread时间轮线程详解.md","url":"/tech-docs/开源学习/xxl-job/ringthread时间轮线程详解/","kind":"markdown","markdown":"# ringThread 时间轮线程详解\n\n## 📋 目录\n1. [核心职责](#核心职责)\n2. [工作流程](#工作流程)\n3. [关键步骤详解](#关键步骤详解)\n4. [容错机制](#容错机制)\n5. [代码解析](#代码解析)\n\n---\n\n## 🎯 核心职责\n\n`ringThread` 是时间轮线程，主要负责：\n\n1. **精确触发**：在精确的秒级时间点触发任务\n2. **时间对齐**：对齐到整秒，保证触发时间的精确性\n3. **批量处理**：从时间轮中取出任务并批量触发\n4. **容错处理**：向前校验，避免遗漏任务\n\n---\n\n## 🔄 工作流程\n\n### 完整流程图\n\n```\nringThread 工作流程：\n\n开始\n  │\n  ▼\n对齐到整秒（sleep到下一个整秒）\n  │\n  ▼\n获取当前秒数（0-59）\n  │\n  ▼\n┌─────────────────────────────────┐\n│  收集时间轮数据                  │\n│  - 当前秒的任务                  │\n│  - 前1秒的任务（避免遗漏）        │\n│  - 前2秒的任务（避免遗漏）        │\n└─────────────────────────────────┘\n  │\n  ▼\n去重处理（避免重复触发）\n  │\n  ▼\n批量触发任务\n  │\n  ▼\n清空已处理的数据\n  │\n  ▼\n等待到下一个整秒\n  │\n  ▼\n循环\n```\n\n---\n\n## 🔍 关键步骤详解\n\n### 步骤1：对齐到整秒\n\n```java\n// align second\nTimeUnit.MILLISECONDS.sleep(1000 - System.currentTimeMillis() % 1000);\n```\n\n**作用**：\n- 确保在整秒时刻触发任务\n- 例如：10:30:25.500 → sleep 500ms → 10:30:26.000\n\n**示例**：\n```\n当前时间：10:30:25.350\n计算：1000 - 350 = 650ms\nsleep 650ms\n结果：10:30:26.000（精确到整秒）\n```\n\n### 步骤2：获取当前秒数\n\n```java\nint nowSecond = Calendar.getInstance().get(Calendar.SECOND);\n```\n\n**作用**：\n- 获取当前时间的秒数（0-59）\n- 用于从时间轮中取出对应秒数的任务\n\n### 步骤3：收集时间轮数据（核心逻辑）\n\n```java\nfor (int i = 0; i \u003c= 2; i++) {\n    List\u003cInteger> ringItemList = ringData.remove((nowSecond + 60 - i) % 60);\n    if (CollectionTool.isNotEmpty(ringItemList)) {\n        // 去重\n        List\u003cInteger> ringItemListDistinct = ringItemList.stream().distinct().toList();\n        // 收集\n        ringItemData.addAll(ringItemListDistinct);\n    }\n}\n```\n\n**收集范围**：\n- `i=0`：当前秒（nowSecond）\n- `i=1`：前1秒（nowSecond-1）\n- `i=2`：前2秒（nowSecond-2）\n\n**为什么收集前2秒？**\n- 避免处理耗时导致遗漏\n- 如果处理耗时超过1秒，可能跨过刻度\n\n**示例**：\n```\n当前秒数：30\n收集范围：\n- i=0: (30+60-0)%60 = 30秒\n- i=1: (30+60-1)%60 = 29秒\n- i=2: (30+60-2)%60 = 28秒\n\n从时间轮中取出：\nringData.remove(30) → [1, 2, 3]\nringData.remove(29) → [4, 5]\nringData.remove(28) → [6]\n\n合并：ringItemData = [1, 2, 3, 4, 5, 6]\n```\n\n### 步骤4：去重处理\n\n```java\nList\u003cInteger> ringItemListDistinct = ringItemList.stream().distinct().toList();\nif (ringItemListDistinct.size() \u003c ringItemList.size()) {\n    logger.warn(\">>>>>>>>>>> xxl-job, time-ring found job repeat beat : \" + nowSecond + \" = \" + ringItemData);\n}\n```\n\n**作用**：\n- 避免重复触发同一个任务\n- 如果发现重复，记录警告日志\n\n**为什么会有重复？**\n- scheduleThread 可能多次推送同一个任务到时间轮\n- 例如：任务在边界时间，可能被多次放入\n\n### 步骤5：批量触发任务\n\n```java\nif (CollectionTool.isNotEmpty(ringItemData)) {\n    for (int jobId: ringItemData) {\n        XxlJobAdminBootstrap.getInstance()\n            .getJobTriggerPoolHelper()\n            .trigger(jobId, TriggerTypeEnum.CRON, -1, null, null, null);\n    }\n    ringItemData.clear();\n}\n```\n\n**作用**：\n- 批量触发收集到的任务\n- 触发类型：CRON（正常调度）\n- 清空已处理的数据\n\n---\n\n## 🛡️ 容错机制\n\n### 1. 向前校验2秒\n\n**原因**：\n```\n场景：处理耗时导致遗漏\n\n10:30:25.000 - 应该触发任务A\n10:30:25.500 - ringThread 开始处理第25秒的任务\n10:30:26.000 - 处理完成，但耗时0.5秒\n10:30:26.000 - 开始处理第26秒的任务\n              - 但第25秒的任务可能还没处理完\n\n解决方案：向前校验2秒\n- 在10:30:26.000时，不仅处理第26秒的任务\n- 还处理第25秒和第24秒的任务\n- 确保不会遗漏\n```\n\n### 2. 去重处理\n\n**原因**：\n```\n场景：重复推送导致重复触发\n\n10:30:25.000 - scheduleThread 推送任务A到第25秒\n10:30:25.500 - scheduleThread 再次推送任务A到第25秒（边界情况）\n\n解决方案：去重\n- 使用 distinct() 去重\n- 确保同一个任务只触发一次\n```\n\n### 3. 时间对齐\n\n**原因**：\n```\n场景：时间不精确导致触发时间偏差\n\n10:30:25.350 - 如果不对齐，可能在这个时间触发\n10:30:25.500 - 或者在这个时间触发\n\n解决方案：对齐到整秒\n- sleep到下一个整秒\n- 确保在精确的整秒时刻触发\n```\n\n---\n\n## 💻 代码解析\n\n### 完整代码\n\n```java\n// ring thread\nringThread = new Thread(new Runnable() {\n    @Override\n    public void run() {\n        while (!ringThreadToStop) {\n            \n            // 1. 对齐到整秒\n            try {\n                TimeUnit.MILLISECONDS.sleep(1000 - System.currentTimeMillis() % 1000);\n            } catch (Throwable e) {\n                if (!ringThreadToStop) {\n                    logger.error(e.getMessage(), e);\n                }\n            }\n            \n            try {\n                // 2. 初始化收集列表\n                List\u003cInteger> ringItemData = new ArrayList\u003c>();\n                \n                // 3. 获取当前秒数\n                int nowSecond = Calendar.getInstance().get(Calendar.SECOND);\n                \n                // 4. 收集时间轮数据（当前秒及前2秒）\n                for (int i = 0; i \u003c= 2; i++) {\n                    List\u003cInteger> ringItemList = ringData.remove((nowSecond + 60 - i) % 60);\n                    if (CollectionTool.isNotEmpty(ringItemList)) {\n                        // 5. 去重\n                        List\u003cInteger> ringItemListDistinct = \n                            ringItemList.stream().distinct().toList();\n                        if (ringItemListDistinct.size() \u003c ringItemList.size()) {\n                            logger.warn(\">>>>>>>>>>> xxl-job, time-ring found job repeat beat : \" \n                                + nowSecond + \" = \" + ringItemData);\n                        }\n                        // 6. 收集\n                        ringItemData.addAll(ringItemListDistinct);\n                    }\n                }\n                \n                // 7. 批量触发\n                logger.debug(\">>>>>>>>>>> xxl-job, time-ring beat : \" + nowSecond + \" = \" + ringItemData);\n                if (CollectionTool.isNotEmpty(ringItemData)) {\n                    for (int jobId: ringItemData) {\n                        XxlJobAdminBootstrap.getInstance()\n                            .getJobTriggerPoolHelper()\n                            .trigger(jobId, TriggerTypeEnum.CRON, -1, null, null, null);\n                    }\n                    ringItemData.clear();\n                }\n            } catch (Throwable e) {\n                if (!ringThreadToStop) {\n                    logger.error(\">>>>>>>>>>> xxl-job, JobScheduleHelper#ringThread error:{}\", \n                        e.getMessage(), e);\n                }\n            }\n        }\n        logger.info(\">>>>>>>>>>> xxl-job, JobScheduleHelper#ringThread stop\");\n    }\n});\n```\n\n---\n\n## 📊 时间线示例\n\n### 完整执行流程\n\n```\n时间：10:30:25.350 → 10:30:26.000 → 10:30:27.000\n\n10:30:25.350 - ringThread 开始执行\n              │\n              ▼\n10:30:25.350 - 计算 sleep 时间\n              sleep(1000 - 350) = sleep(650ms)\n              │\n              ▼\n10:30:26.000 - 对齐到整秒\n              │\n              ▼\n10:30:26.000 - 获取当前秒数：26\n              │\n              ▼\n10:30:26.000 - 收集时间轮数据\n              - 第26秒：[1, 2, 3]\n              - 第25秒：[4, 5]\n              - 第24秒：[6]\n              │\n              ▼\n10:30:26.000 - 去重处理\n              ringItemData = [1, 2, 3, 4, 5, 6]\n              │\n              ▼\n10:30:26.000 - 批量触发\n              trigger(1, CRON, ...)\n              trigger(2, CRON, ...)\n              trigger(3, CRON, ...)\n              trigger(4, CRON, ...)\n              trigger(5, CRON, ...)\n              trigger(6, CRON, ...)\n              │\n              ▼\n10:30:26.000 - 清空数据\n              ringItemData.clear()\n              │\n              ▼\n10:30:26.000 - 等待下一个整秒\n              sleep(1000 - 0) = sleep(1000ms)\n              │\n              ▼\n10:30:27.000 - 下一轮循环\n```\n\n---\n\n## 🎨 设计亮点\n\n### 1. 精确触发\n\n- **对齐到整秒**：确保在精确的整秒时刻触发\n- **秒级精度**：时间轮精确到秒，满足大部分调度需求\n\n### 2. 容错机制\n\n- **向前校验2秒**：避免处理耗时导致遗漏\n- **去重处理**：避免重复触发\n- **异常处理**：捕获异常，不影响后续执行\n\n### 3. 高效处理\n\n- **批量触发**：一次处理多个任务\n- **O(1) 取任务**：从时间轮中取任务时间复杂度为 O(1)\n- **内存清理**：处理完立即清空，避免内存泄漏\n\n### 4. 解耦设计\n\n- **生产者-消费者**：scheduleThread 生产，ringThread 消费\n- **时间轮缓冲**：作为缓冲区，解耦扫描和触发\n\n---\n\n## 🔄 与 scheduleThread 的配合\n\n### 协作流程\n\n```\nscheduleThread (生产者)          ringData (时间轮)          ringThread (消费者)\n     │                              │                          │\n     │ 扫描任务                      │                          │\n     │ 发现任务A在26秒执行            │                          │\n     │                              │                          │\n     │──────────────────────────────>│                          │\n     │ pushTimeRing(26, A)          │ [26: [A]]               │\n     │                              │                          │\n     │                              │                          │ 10:30:26.000\n     │                              │                          │ 对齐到整秒\n     │                              │                          │\n     │                              │\u003c─────────────────────────│\n     │                              │ remove(26, 25, 24)      │\n     │                              │                          │\n     │                              │                          │ 触发任务A\n     │                              │                          │\n```\n\n---\n\n## 📝 关键代码片段解析\n\n### 1. 时间对齐\n\n```java\nTimeUnit.MILLISECONDS.sleep(1000 - System.currentTimeMillis() % 1000);\n```\n\n**计算逻辑**：\n```\n当前时间：10:30:25.350\nSystem.currentTimeMillis() % 1000 = 350\nsleep(1000 - 350) = sleep(650ms)\n结果：10:30:26.000\n```\n\n### 2. 收集时间轮数据\n\n```java\nfor (int i = 0; i \u003c= 2; i++) {\n    List\u003cInteger> ringItemList = ringData.remove((nowSecond + 60 - i) % 60);\n    // ...\n}\n```\n\n**取模运算**：\n```\nnowSecond = 30\ni=0: (30+60-0)%60 = 30\ni=1: (30+60-1)%60 = 29\ni=2: (30+60-2)%60 = 28\n\nnowSecond = 1\ni=0: (1+60-0)%60 = 1\ni=1: (1+60-1)%60 = 0\ni=2: (1+60-2)%60 = 59  ← 处理跨分钟的情况\n```\n\n### 3. 去重处理\n\n```java\nList\u003cInteger> ringItemListDistinct = ringItemList.stream().distinct().toList();\n```\n\n**示例**：\n```\n原始列表：[1, 2, 2, 3, 3, 3]\n去重后：[1, 2, 3]\n```\n\n---\n\n## ⚠️ 注意事项\n\n### 1. 时间对齐的重要性\n\n- **必须对齐**：不对齐会导致触发时间不精确\n- **影响调度**：时间偏差会影响任务的执行时间\n\n### 2. 向前校验的必要性\n\n- **避免遗漏**：处理耗时可能导致遗漏\n- **校验范围**：向前校验2秒，平衡性能和准确性\n\n### 3. 去重的重要性\n\n- **避免重复**：重复触发可能导致业务问题\n- **性能影响**：重复触发会增加系统负载\n\n---\n\n## 📝 总结\n\n`ringThread` 主要做了以下几件事：\n\n1. ✅ **时间对齐**：对齐到整秒，保证触发时间的精确性\n2. ✅ **数据收集**：从时间轮中收集当前秒及前2秒的任务\n3. ✅ **去重处理**：避免重复触发同一个任务\n4. ✅ **批量触发**：批量触发收集到的任务\n5. ✅ **容错处理**：向前校验，避免遗漏任务\n\n`ringThread` 是时间轮机制的核心，负责精确触发任务，与 `scheduleThread` 配合实现了高效、精确的任务调度。\n\n","headings":[{"level":1,"text":"ringThread 时间轮线程详解","id":"ringthread-时间轮线程详解"},{"level":2,"text":"📋 目录","id":"目录"},{"level":2,"text":"🎯 核心职责","id":"核心职责"},{"level":2,"text":"🔄 工作流程","id":"工作流程"},{"level":3,"text":"完整流程图","id":"完整流程图"},{"level":2,"text":"🔍 关键步骤详解","id":"关键步骤详解"},{"level":3,"text":"步骤1：对齐到整秒","id":"步骤1-对齐到整秒"},{"level":3,"text":"步骤2：获取当前秒数","id":"步骤2-获取当前秒数"},{"level":3,"text":"步骤3：收集时间轮数据（核心逻辑）","id":"步骤3-收集时间轮数据-核心逻辑"},{"level":3,"text":"步骤4：去重处理","id":"步骤4-去重处理"},{"level":3,"text":"步骤5：批量触发任务","id":"步骤5-批量触发任务"},{"level":2,"text":"🛡️ 容错机制","id":"容错机制"},{"level":3,"text":"1. 向前校验2秒","id":"1.-向前校验2秒"},{"level":3,"text":"2. 去重处理","id":"2.-去重处理"},{"level":3,"text":"3. 时间对齐","id":"3.-时间对齐"},{"level":2,"text":"💻 代码解析","id":"代码解析"},{"level":3,"text":"完整代码","id":"完整代码"},{"level":2,"text":"📊 时间线示例","id":"时间线示例"},{"level":3,"text":"完整执行流程","id":"完整执行流程"},{"level":2,"text":"🎨 设计亮点","id":"设计亮点"},{"level":3,"text":"1. 精确触发","id":"1.-精确触发"},{"level":3,"text":"2. 容错机制","id":"2.-容错机制"},{"level":3,"text":"3. 高效处理","id":"3.-高效处理"},{"level":3,"text":"4. 解耦设计","id":"4.-解耦设计"},{"level":2,"text":"🔄 与 scheduleThread 的配合","id":"与-schedulethread-的配合"},{"level":3,"text":"协作流程","id":"协作流程"},{"level":2,"text":"📝 关键代码片段解析","id":"关键代码片段解析"},{"level":3,"text":"1. 时间对齐","id":"1.-时间对齐"},{"level":3,"text":"2. 收集时间轮数据","id":"2.-收集时间轮数据"},{"level":3,"text":"3. 去重处理","id":"3.-去重处理"},{"level":2,"text":"⚠️ 注意事项","id":"注意事项"},{"level":3,"text":"1. 时间对齐的重要性","id":"1.-时间对齐的重要性"},{"level":3,"text":"2. 向前校验的必要性","id":"2.-向前校验的必要性"},{"level":3,"text":"3. 去重的重要性","id":"3.-去重的重要性"},{"level":2,"text":"📝 总结","id":"总结"}],"excerpt":"ringThread 时间轮线程详解 📋 目录 1. 核心职责 2. 工作流程 3. 关键步骤详解 4. 容错机制 5. 代码解析 --- 🎯 核心职责 ringThread 是时间轮线程，主要负责： 1. 精确触发：在精确的秒级时间点触发任务 2. 时间对齐：对齐到整秒，保证触发时间的精确性 3. 批量处理：从时间轮中取出任务并批量触发 4. 容错处理","isEmpty":false,"wordCount":9391,"up
