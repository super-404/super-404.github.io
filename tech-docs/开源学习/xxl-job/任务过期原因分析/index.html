window.TECH_DOC = {"id":"689cc860","title":"为什么会出现 nowTime triggerNextTime + PREREADMS 的情况","group":"开源学习","relativePath":"开源学习/Xxl-job/任务过期原因分析.md","url":"/tech-docs/开源学习/xxl-job/任务过期原因分析/","kind":"markdown","markdown":"# 为什么会出现 `nowTime > triggerNextTime + PRE_READ_MS` 的情况\n\n## 📊 问题场景\n\n```java\n// 查询条件：trigger_next_time \u003c= nowTime + PRE_READ_MS\nList\u003cXxlJobInfo> scheduleList = scheduleJobQuery(nowTime + PRE_READ_MS, preReadCount);\n\n// 处理时发现：任务已经过期超过5秒\nif (nowTime > jobInfo.getTriggerNextTime() + PRE_READ_MS) {\n    // 处理 misfire\n}\n```\n\n## 🔍 原因分析\n\n### SQL 查询逻辑\n\n```sql\nSELECT * FROM xxl_job_info\nWHERE trigger_status = 1\n  AND trigger_next_time \u003c= #{maxNextTime}  -- maxNextTime = nowTime + 5000\nORDER BY id ASC\nLIMIT #{pagesize}\n```\n\n**查询范围**：`trigger_next_time \u003c= nowTime + 5000`\n\n这意味着会查询到：\n- ✅ 未来5秒内的任务（正常）\n- ⚠️ 已过期但 \u003c 5秒的任务（可立即触发）\n- ❌ **已过期 > 5秒的任务（这就是问题所在）**\n\n---\n\n## 🎯 出现这种情况的原因\n\n### 原因1：调度线程处理延迟\n\n```\n时间线分析：\n\n10:30:20.000 - 任务A应该在此时执行（triggerNextTime = 10:30:20.000）\n10:30:20.500 - 调度线程开始扫描\n10:30:21.000 - 数据库查询完成，获取到任务A\n10:30:22.000 - 处理其他任务（任务B、C、D...）\n10:30:25.000 - 开始处理任务A\n10:30:25.500 - 判断：nowTime(10:30:25.500) > triggerNextTime(10:30:20.000) + 5000\n                → 过期超过5秒！❌\n\n原因：处理队列中的其他任务耗时，导致任务A被延迟处理\n```\n\n**图解**：\n```\n调度线程处理流程：\n┌─────────────────────────────────────────────────┐\n│ 10:30:20.500 - 开始扫描                         │\n│ 查询到任务列表：[A, B, C, D, E, F, G, H, I, J] │\n└─────────────────────────────────────────────────┘\n         │\n         ▼\n┌─────────────────────────────────────────────────┐\n│ 10:30:21.000 - 开始处理任务B                    │\n│ 处理耗时：1秒                                   │\n└─────────────────────────────────────────────────┘\n         │\n         ▼\n┌─────────────────────────────────────────────────┐\n│ 10:30:22.000 - 开始处理任务C                    │\n│ 处理耗时：1秒                                   │\n└─────────────────────────────────────────────────┘\n         │\n         ▼\n         ... (处理更多任务)\n         │\n         ▼\n┌─────────────────────────────────────────────────┐\n│ 10:30:25.000 - 开始处理任务A                    │\n│ 此时任务A已经过期 5 秒！                        │\n└─────────────────────────────────────────────────┘\n```\n\n### 原因2：数据库查询慢\n\n```\n时间线分析：\n\n10:30:20.000 - 任务A应该在此时执行\n10:30:20.500 - 调度线程开始扫描\n10:30:22.000 - 数据库查询完成（耗时1.5秒）\n10:30:22.000 - 获取到任务A时，已经过期1.5秒\n10:30:25.000 - 处理到任务A时，已经过期5秒\n\n原因：数据库查询慢，导致获取到任务时已经过期\n```\n\n**图解**：\n```\n数据库查询延迟：\n┌─────────────────────────────────────────────────┐\n│ 10:30:20.500 - 发送SQL查询                       │\n│ SELECT ... WHERE trigger_next_time \u003c= 10:30:25.500│\n└─────────────────────────────────────────────────┘\n         │\n         │ 数据库查询耗时 1.5 秒\n         │ (可能原因：数据量大、索引慢、锁等待)\n         ▼\n┌─────────────────────────────────────────────────┐\n│ 10:30:22.000 - 查询结果返回                      │\n│ 任务A的 triggerNextTime = 10:30:20.000          │\n│ 此时已经过期 2 秒                                │\n└─────────────────────────────────────────────────┘\n         │\n         │ 处理其他任务耗时 3 秒\n         ▼\n┌─────────────────────────────────────────────────┐\n│ 10:30:25.000 - 处理任务A                         │\n│ 此时已经过期 5 秒！                              │\n└─────────────────────────────────────────────────┘\n```\n\n### 原因3：任务数量过多，处理不过来\n\n```\n场景：系统中有大量任务需要调度\n\n10:30:20.000 - 任务A应该在此时执行\n10:30:20.500 - 扫描到100个任务需要处理\n10:30:21.000 - 开始处理，按顺序处理\n10:30:25.000 - 处理到第50个任务（任务A排在第50个）\n10:30:25.500 - 判断：任务A已经过期5秒\n\n原因：任务队列太长，处理顺序靠后的任务时已经过期\n```\n\n**图解**：\n```\n任务处理队列：\n┌─────────────────────────────────────────────────┐\n│ 扫描到的任务列表（100个任务）                    │\n│ [1, 2, 3, ..., 49, A(50), 51, 52, ..., 100]    │\n└─────────────────────────────────────────────────┘\n         │\n         │ 按顺序处理\n         ▼\n┌─────────────────────────────────────────────────┐\n│ 10:30:21.000 - 处理任务1                         │\n│ 10:30:21.100 - 处理任务2                         │\n│ 10:30:21.200 - 处理任务3                         │\n│ ...                                              │\n│ 10:30:25.000 - 处理任务A（第50个）               │\n│ 此时任务A已经过期 5 秒！                          │\n└─────────────────────────────────────────────────┘\n```\n\n### 原因4：上一次扫描时任务在边界，这次扫描时已过期\n\n```\n场景：上一次扫描时任务刚好在5秒边界\n\n10:30:15.000 - 上一次扫描\n10:30:15.500 - 查询条件：trigger_next_time \u003c= 10:30:20.500\n10:30:15.500 - 任务A的 triggerNextTime = 10:30:20.000\n10:30:15.500 - 任务A在查询范围内，但还没到执行时间\n10:30:15.500 - 任务A被放入时间轮（第20秒）\n\n10:30:20.000 - 任务A应该执行\n10:30:20.000 - 但时间轮线程可能因为某些原因没有触发\n\n10:30:25.000 - 下一次扫描\n10:30:25.500 - 查询条件：trigger_next_time \u003c= 10:30:30.500\n10:30:25.500 - 任务A的 triggerNextTime = 10:30:20.000\n10:30:25.500 - 任务A仍在查询范围内\n10:30:25.500 - 判断：nowTime(10:30:25.500) > triggerNextTime(10:30:20.000) + 5000\n                → 过期超过5秒！❌\n\n原因：上一次扫描时任务在边界，但时间轮没有触发，这次扫描时已经过期\n```\n\n### 原因5：系统负载高，线程被阻塞\n\n```\n场景：系统负载高，调度线程被阻塞\n\n10:30:20.000 - 任务A应该在此时执行\n10:30:20.500 - 调度线程开始扫描\n10:30:20.600 - 调度线程被GC阻塞（暂停1秒）\n10:30:21.600 - GC结束，继续处理\n10:30:22.000 - 数据库查询（因为阻塞，查询也延迟）\n10:30:25.000 - 处理到任务A时，已经过期5秒\n\n原因：系统负载高，GC、锁竞争等导致线程阻塞\n```\n\n---\n\n## 📈 完整时间线示例\n\n```\n详细时间线：\n\nT0: 10:30:20.000 - 任务A应该执行（triggerNextTime）\nT1: 10:30:20.500 - 调度线程开始扫描\nT2: 10:30:21.000 - 数据库查询完成，获取到任务A\nT3: 10:30:21.000 - 开始处理任务列表\nT4: 10:30:22.000 - 处理任务B（耗时1秒）\nT5: 10:30:23.000 - 处理任务C（耗时1秒）\nT6: 10:30:24.000 - 处理任务D（耗时1秒）\nT7: 10:30:25.000 - 开始处理任务A\nT8: 10:30:25.500 - 判断任务A状态\n\n判断逻辑：\nnowTime = 10:30:25.500\ntriggerNextTime = 10:30:20.000\nPRE_READ_MS = 5000\n\nnowTime > triggerNextTime + PRE_READ_MS\n10:30:25.500 > 10:30:20.000 + 5000\n10:30:25.500 > 10:30:25.000\ntrue → 过期超过5秒！❌\n```\n\n---\n\n## 🎨 可视化流程图\n\n```\n任务过期超过5秒的场景：\n\n┌─────────────────────────────────────────────────┐\n│ 任务A：triggerNextTime = 10:30:20.000            │\n└─────────────────────────────────────────────────┘\n         │\n         │ 时间流逝\n         ▼\n┌─────────────────────────────────────────────────┐\n│ 10:30:20.500 - 调度线程开始扫描                  │\n│ 查询条件：trigger_next_time \u003c= 10:30:25.500    │\n│ 任务A在查询范围内                                │\n└─────────────────────────────────────────────────┘\n         │\n         │ 数据库查询 + 处理其他任务\n         │ 耗时：5秒\n         ▼\n┌─────────────────────────────────────────────────┐\n│ 10:30:25.500 - 处理任务A                         │\n│ nowTime = 10:30:25.500                          │\n│ triggerNextTime = 10:30:20.000                  │\n│ 过期时间 = 5.5秒 > 5秒                           │\n│ → 进入 misfire 处理流程                          │\n└─────────────────────────────────────────────────┘\n```\n\n---\n\n## 🔧 为什么SQL会查询到过期任务？\n\n### SQL查询逻辑\n\n```sql\n-- 查询条件\nWHERE trigger_next_time \u003c= nowTime + 5000\n\n-- 这意味着会查询到：\n-- 1. trigger_next_time \u003c= nowTime + 5000 的所有任务\n-- 2. 包括已经过期的任务（只要 \u003c= nowTime + 5000）\n```\n\n**示例**：\n```\n当前时间：10:30:25.500\n查询条件：trigger_next_time \u003c= 10:30:30.500\n\n会查询到：\n- 10:30:20.000（过期5.5秒）✅ 会被查询到\n- 10:30:25.000（过期0.5秒）✅ 会被查询到\n- 10:30:26.000（未来0.5秒）✅ 会被查询到\n- 10:30:30.000（未来4.5秒）✅ 会被查询到\n- 10:30:31.000（未来5.5秒）❌ 不会被查询到\n```\n\n---\n\n## 💡 设计考虑\n\n### 为什么允许查询过期任务？\n\n1. **容错性**：处理上一次扫描遗漏的任务\n2. **补偿机制**：通过 misfire 策略处理过期任务\n3. **简化逻辑**：统一查询条件，避免复杂的边界判断\n\n### 为什么是5秒阈值？\n\n1. **平衡点**：既不会遗漏太多，也不会查询过多过期任务\n2. **处理能力**：5秒内通常能处理完大部分任务\n3. **容错范围**：超过5秒的过期任务通过 misfire 处理\n\n---\n\n## 📝 总结\n\n出现 `nowTime > triggerNextTime + PRE_READ_MS` 的原因：\n\n1. ✅ **调度线程处理延迟**：处理队列中其他任务耗时\n2. ✅ **数据库查询慢**：获取任务时已经过期\n3. ✅ **任务数量过多**：处理顺序靠后的任务时已过期\n4. ✅ **上一次扫描边界**：任务在边界但未触发，这次扫描时已过期\n5. ✅ **系统负载高**：GC、锁竞争等导致线程阻塞\n\n这是**正常的设计**，通过 misfire 策略来处理这些过期任务，确保任务不会永久丢失。\n\n","headings":[{"level":1,"text":"为什么会出现 nowTime triggerNextTime + PREREADMS 的情况","id":"为什么会出现-nowtime-triggernexttime---prereadms-的情况"},{"level":2,"text":"📊 问题场景","id":"问题场景"},{"level":2,"text":"🔍 原因分析","id":"原因分析"},{"level":3,"text":"SQL 查询逻辑","id":"sql-查询逻辑"},{"level":2,"text":"🎯 出现这种情况的原因","id":"出现这种情况的原因"},{"level":3,"text":"原因1：调度线程处理延迟","id":"原因1-调度线程处理延迟"},{"level":3,"text":"原因2：数据库查询慢","id":"原因2-数据库查询慢"},{"level":3,"text":"原因3：任务数量过多，处理不过来","id":"原因3-任务数量过多-处理不过来"},{"level":3,"text":"原因4：上一次扫描时任务在边界，这次扫描时已过期","id":"原因4-上一次扫描时任务在边界-这次扫描时已过期"},{"level":3,"text":"原因5：系统负载高，线程被阻塞","id":"原因5-系统负载高-线程被阻塞"},{"level":2,"text":"📈 完整时间线示例","id":"完整时间线示例"},{"level":2,"text":"🎨 可视化流程图","id":"可视化流程图"},{"level":2,"text":"🔧 为什么SQL会查询到过期任务？","id":"为什么sql会查询到过期任务"},{"level":3,"text":"SQL查询逻辑","id":"sql查询逻辑"},{"level":2,"text":"💡 设计考虑","id":"设计考虑"},{"level":3,"text":"为什么允许查询过期任务？","id":"为什么允许查询过期任务"},{"level":3,"text":"为什么是5秒阈值？","id":"为什么是5秒阈值"},{"level":2,"text":"📝 总结","id":"总结"}],"excerpt":"为什么会出现 nowTime triggerNextTime + PREREADMS 的情况 📊 问题场景 🔍 原因分析 SQL 查询逻辑 查询范围：`triggernexttime 5秒的任务（这就是问题所在） --- 🎯 出现这种情况的原因 原因1：调度线程处理延迟 图解： 原因2：数据库查询慢 图解： 原因3：任务数量过多，处理不过来 图解： 原","isEmpty":false,"wordCount":6979,"updatedAt":"2025-12-30T08:00:15.000Z"};
