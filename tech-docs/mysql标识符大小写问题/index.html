window.TECH_DOC = {"id":"51aaba84","title":"数据库连接配置","group":"基础文档","relativePath":"mysql标识符大小写问题.markdown","url":"/tech-docs/mysql标识符大小写问题/","kind":"markdown","markdown":"这个MySQL消息是关于**数据库、表和列名的大小写敏感设置**。让我详细解释这个问题和相关的配置：\n\n## 消息解释\n\n```\nCase sensitivity: plain=mixed, delimited=mixed\n```\n\n这表示MySQL的标识符（数据库名、表名、列名）的大小写处理规则：\n\n- **plain=mixed**：未使用反引号包裹的标识符，在存储时可能被转换为小写，但查询时不区分大小写\n- **delimited=mixed**：使用反引号包裹的标识符，保持原样存储和区分大小写\n\n## MySQL大小写敏感规则\n\n### 1. 不同操作系统的影响\n| 操作系统 | 默认行为     | 说明               |\n| -------- | ------------ | ------------------ |\n| Windows  | 不区分大小写 | 文件名不区分大小写 |\n| macOS    | 通常不区分   | 但文件系统可以配置 |\n| Linux    | 区分大小写   | 文件名区分大小写   |\n\n### 2. MySQL配置参数\n\n```sql\n-- 查看当前大小写配置\nSHOW VARIABLES LIKE 'lower_case_table_names';\n```\n\n- **0**：区分大小写（Linux默认）\n- **1**：不区分大小写（Windows默认）\n- **2**：存储时按原样，查询时转换为小写\n\n## 解决方案\n\n### 方案1：统一使用小写命名（推荐）\n\n```sql\n-- 创建数据库、表、列时统一使用小写\nCREATE DATABASE seckill_db;\n\nCREATE TABLE seckill_user (\n    id BIGINT PRIMARY KEY,\n    username VARCHAR(50),\n    email VARCHAR(100),\n    create_time DATETIME\n);\n```\n\n### 方案2：使用反引号包裹标识符\n\n```sql\n-- 如果需要使用大写或特殊字符，使用反引号\nCREATE TABLE `SeckillUser` (\n    `Id` BIGINT PRIMARY KEY,\n    `UserName` VARCHAR(50),\n    `Email` VARCHAR(100),\n    `CreateTime` DATETIME\n);\n\n-- 查询时也要使用反引号\nSELECT `Id`, `UserName` FROM `SeckillUser`;\n```\n\n### 方案3：修改MySQL配置（需要重启）\n\n**Linux系统修改 `/etc/my.cnf`：**\n```ini\n[mysqld]\nlower_case_table_names=1\n```\n\n**Windows系统修改 `my.ini`：**\n```ini\n[mysqld]\nlower_case_table_names=1\n```\n\n## 应用代码中的最佳实践\n\n### 1. MyBatis配置中使用小写\n\n```xml\n\u003c!-- mapper.xml -->\n\u003cselect id=\"selectUserById\" resultType=\"io.binghe.seckill.domain.model.User\">\n    SELECT id, username, email, create_time as createTime\n    FROM seckill_user  \u003c!-- 使用小写表名 -->\n    WHERE id = #{id}\n\u003c/select>\n```\n\n### 2. 实体类字段映射\n\n```java\npublic class SeckillUser {\n    private Long id;\n    private String username;\n    private String email;\n    \n    // 使用@Column注解明确指定列名\n    @Column(name = \"create_time\")\n    private Date createTime;\n    \n    // getter和setter\n}\n```\n\n### 3. JPA实体配置\n\n```java\n@Entity\n@Table(name = \"seckill_user\")  // 明确指定小写表名\npublic class SeckillUser {\n    @Id\n    private Long id;\n    \n    @Column(name = \"username\")  // 明确指定小写列名\n    private String username;\n    \n    // 其他字段\n}\n```\n\n## 完整的数据库配置示例\n\n### 1. 数据库初始化脚本\n\n```sql\n-- 创建数据库\nCREATE DATABASE IF NOT EXISTS `seckill_db` CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;\n\nUSE `seckill_db`;\n\n-- 创建用户表（全部使用小写）\nCREATE TABLE `seckill_user` (\n    `id` BIGINT NOT NULL AUTO_INCREMENT,\n    `username` VARCHAR(50) NOT NULL UNIQUE,\n    `password` VARCHAR(255) NOT NULL,\n    `phone` VARCHAR(20),\n    `email` VARCHAR(100),\n    `create_time` DATETIME DEFAULT CURRENT_TIMESTAMP,\n    `update_time` DATETIME DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,\n    PRIMARY KEY (`id`)\n) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;\n\n-- 创建商品表\nCREATE TABLE `seckill_goods` (\n    `id` BIGINT NOT NULL AUTO_INCREMENT,\n    `goods_name` VARCHAR(100) NOT NULL,\n    `goods_price` DECIMAL(10,2) NOT NULL,\n    `stock_count` INT NOT NULL,\n    `start_time` DATETIME,\n    `end_time` DATETIME,\n    PRIMARY KEY (`id`)\n) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;\n```\n\n### 2. application.properties 配置\n\n```properties\n# 数据库连接配置\nspring.datasource.url=jdbc:mysql://localhost:3306/seckill_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai\nspring.datasource.username=root\nspring.datasource.password=your_password\n\n# JPA配置\nspring.jpa.hibernate.ddl-auto=validate  # 使用validate而不是create-drop\nspring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect\nspring.jpa.properties.hibernate.globally_quoted_identifiers=true\n\n# MyBatis配置\nmybatis.configuration.map-underscore-to-camel-case=true\n```\n\n### 3. 避免大小写问题的代码实践\n\n```java\n@Repository\npublic class SeckillUserRepository {\n    \n    // 使用小写SQL\n    private static final String FIND_BY_USERNAME = \n        \"SELECT * FROM seckill_user WHERE username = ?\";\n    \n    // 或者使用命名参数\n    private static final String FIND_BY_EMAIL = \n        \"SELECT * FROM seckill_user WHERE email = :email\";\n}\n```\n\n## 排查和验证\n\n### 1. 检查数据库大小写配置\n\n```sql\n-- 查看当前配置\nSHOW VARIABLES LIKE 'lower_case_table_names';\n\n-- 查看数据库排序规则\nSHOW CREATE DATABASE seckill_db;\n\n-- 查看表排序规则\nSHOW CREATE TABLE seckill_user;\n```\n\n### 2. 测试大小写敏感性\n\n```sql\n-- 测试查询是否区分大小写\nSELECT * FROM SECKILL_USER;  -- 可能报错\nSELECT * FROM seckill_user;  -- 正确\nSELECT * FROM `seckill_user`; -- 正确\n```\n\n## 总结\n\n**\"Case sensitivity: plain=mixed, delimited=mixed\"** 是MySQL的正常信息，不是错误。为了确保应用的可移植性和稳定性：\n\n1. **统一使用小写**命名数据库、表和列\n2. **在SQL中保持一致**的大小写使用\n3. **避免混合使用**大小写\n4. **在跨平台部署时**注意操作系统的差异\n5. **使用配置管理**来确保一致性\n\n遵循这些最佳实践可以避免因大小写问题导致的数据库访问错误。","headings":[{"level":2,"text":"消息解释","id":"消息解释"},{"level":2,"text":"MySQL大小写敏感规则","id":"mysql大小写敏感规则"},{"level":3,"text":"1. 不同操作系统的影响","id":"1.-不同操作系统的影响"},{"level":3,"text":"2. MySQL配置参数","id":"2.-mysql配置参数"},{"level":2,"text":"解决方案","id":"解决方案"},{"level":3,"text":"方案1：统一使用小写命名（推荐）","id":"方案1-统一使用小写命名-推荐"},{"level":3,"text":"方案2：使用反引号包裹标识符","id":"方案2-使用反引号包裹标识符"},{"level":3,"text":"方案3：修改MySQL配置（需要重启）","id":"方案3-修改mysql配置-需要重启"},{"level":2,"text":"应用代码中的最佳实践","id":"应用代码中的最佳实践"},{"level":3,"text":"1. MyBatis配置中使用小写","id":"1.-mybatis配置中使用小写"},{"level":3,"text":"2. 实体类字段映射","id":"2.-实体类字段映射"},{"level":3,"text":"3. JPA实体配置","id":"3.-jpa实体配置"},{"level":2,"text":"完整的数据库配置示例","id":"完整的数据库配置示例"},{"level":3,"text":"1. 数据库初始化脚本","id":"1.-数据库初始化脚本"},{"level":3,"text":"2. application.properties 配置","id":"2.-application.properties-配置"},{"level":1,"text":"数据库连接配置","id":"数据库连接配置"},{"level":1,"text":"JPA配置","id":"jpa配置"},{"level":1,"text":"MyBatis配置","id":"mybatis配置"},{"level":3,"text":"3. 避免大小写问题的代码实践","id":"3.-避免大小写问题的代码实践"},{"level":2,"text":"排查和验证","id":"排查和验证"},{"le
