window.TECH_DOC = {"id":"38e08078","title":"spring-boot-2.x.x.jar!/META-INF/spring.factories","group":"springboot","relativePath":"springboot/spring源码阅读/SpringApplicationRunListeners.md","url":"/tech-docs/springboot/spring源码阅读/springapplicationrunlisteners/","kind":"markdown","markdown":"好的，这是 Spring Boot 事件发布机制中的关键方法，用于获取和封装所有的运行监听器。让我们深入解析这个方法。\n\n## 方法概览\n\n**作用**：加载并封装所有 `SpringApplicationRunListener` 实现，用于在应用启动的生命周期不同阶段发布事件。\n\n**返回值**：`SpringApplicationRunListeners` - 运行监听器的组合对象，提供批量操作能力。\n\n---\n\n## 代码逐行深度解析\n\n### 1. 定义构造函数参数类型\n```java\nClass\u003c?>[] types = new Class\u003c?>[] { SpringApplication.class, String[].class };\n```\n\n这里定义了实例化 `SpringApplicationRunListener` 时需要的构造函数参数类型：\n- `SpringApplication.class`：当前 SpringApplication 实例\n- `String[].class`：命令行参数数组\n\n### 2. 加载和实例化监听器\n```java\ngetSpringFactoriesInstances(SpringApplicationRunListener.class, types, this, args)\n```\n\n这是最核心的部分，调用我们之前分析过的 `getSpringFactoriesInstances` 方法：\n\n**参数解析：**\n- `SpringApplicationRunListener.class`：要加载的接口类型\n- `types`：构造函数参数类型数组\n- `this`：当前 SpringApplication 实例（第一个参数）\n- `args`：命令行参数（第二个参数）\n\n**内部执行流程：**\n1. 从 `META-INF/spring.factories` 加载所有 `SpringApplicationRunListener` 实现类名\n2. 通过反射实例化这些类，传入 `this`（SpringApplication）和 `args` 参数\n3. 对实例进行排序（支持 `@Order` 注解等）\n\n### 3. 创建监听器组合对象\n```java\nreturn new SpringApplicationRunListeners(logger,\n        getSpringFactoriesInstances(SpringApplicationRunListener.class, types, this, args));\n```\n\n创建 `SpringApplicationRunListeners` 对象，这是一个**组合模式**的实现。\n\n---\n\n## SpringApplicationRunListeners 类的作用\n\n`SpringApplicationRunListeners` 是一个包装类，它的主要作用是：\n\n### 1. 批量操作多个监听器\n```java\npublic class SpringApplicationRunListeners {\n    private final Log log;\n    private final List\u003cSpringApplicationRunListener> listeners;\n    \n    // 批量调用所有监听器的 starting() 方法\n    public void starting() {\n        for (SpringApplicationRunListener listener : this.listeners) {\n            listener.starting();\n        }\n    }\n    \n    // 批量调用所有监听器的 environmentPrepared() 方法\n    public void environmentPrepared(ConfigurableEnvironment environment) {\n        for (SpringApplicationRunListener listener : this.listeners) {\n            listener.environmentPrepared(environment);\n        }\n    }\n    // ... 其他方法\n}\n```\n\n### 2. 提供统一的日志记录\n```java\npublic void starting() {\n    for (SpringApplicationRunListener listener : this.listeners) {\n        // 统一的日志处理\n        listener.starting();\n    }\n}\n```\n\n### 3. 异常处理\n确保一个监听器的失败不会影响其他监听器的执行。\n\n---\n\n## 实际加载的监听器示例\n\n在 Spring Boot 中，默认会加载以下监听器（来自 `spring-boot.jar` 中的 `META-INF/spring.factories`）：\n\n```properties\n# spring-boot-2.x.x.jar!/META-INF/spring.factories\norg.springframework.boot.SpringApplicationRunListener=\\\norg.springframework.boot.context.event.EventPublishingRunListener\n```\n\n**主要实现：`EventPublishingRunListener`**\n这是最重要的运行监听器，它负责将生命周期事件转换为 Spring 的 `ApplicationEvent`。\n\n---\n\n## 完整的工作流程\n\n### 1. 加载阶段\n```mermaid\ngraph LR\n    A[getRunListeners调用] --> B[定义参数类型 SpringApplication.class, String[].class]\n    B --> C[调用getSpringFactoriesInstances]\n    C --> D[扫描META-INF/spring.factories]\n    D --> E[找到EventPublishingRunListener等实现]\n    E --> F[实例化监听器传入this和args参数]\n    F --> G[创建SpringApplicationRunListeners包装对象]\n    G --> H[返回组合监听器]\n```\n\n### 2. 在启动流程中的使用\n```java\npublic ConfigurableApplicationContext run(String... args) {\n    // 获取监听器\n    SpringApplicationRunListeners listeners = getRunListeners(args);\n    \n    // 发布启动事件\n    listeners.starting();\n    \n    // 准备环境\n    ConfigurableEnvironment environment = prepareEnvironment(listeners, applicationArguments);\n    \n    // 发布上下文准备事件\n    listeners.contextPrepared(context);\n    \n    // ... 其他生命周期事件\n}\n```\n\n---\n\n## 设计模式分析\n\n### 1. **组合模式（Composite Pattern）**\n`SpringApplicationRunListeners` 作为组合对象，统一管理多个 `SpringApplicationRunListener`。\n\n**优点：**\n- 客户端代码可以统一处理单个或多个监听器\n- 简化了批量操作逻辑\n- 隐藏了内部的多监听器管理复杂性\n\n### 2. **观察者模式（Observer Pattern）**\n`SpringApplicationRunListener` 本身就是观察者模式的实现，监听应用启动的生命周期事件。\n\n### 3. **工厂方法模式（Factory Method Pattern）**\n`getSpringFactoriesInstances` 是典型的工厂方法，负责创建对象实例。\n\n---\n\n## 实际应用场景\n\n### 自定义运行监听器\n```java\npublic class CustomRunListener implements SpringApplicationRunListener {\n    \n    public CustomRunListener(SpringApplication application, String[] args) {\n        // 构造函数接收 SpringApplication 和命令行参数\n    }\n    \n    @Override\n    public void starting() {\n        System.out.println(\"应用开始启动...\");\n    }\n    \n    @Override\n    public void environmentPrepared(ConfigurableEnvironment environment) {\n        System.out.println(\"环境准备完成: \" + environment);\n    }\n    \n    // ... 实现其他方法\n}\n```\n\n### 注册自定义监听器\n在 `META-INF/spring.factories` 中注册：\n```properties\norg.springframework.boot.SpringApplicationRunListener=\\\ncom.example.CustomRunListener,\\\norg.springframework.boot.context.event.EventPublishingRunListener\n```\n\n---\n\n## 异常处理机制\n\n`SpringApplicationRunListeners` 内部会有完善的异常处理：\n\n```java\npublic void starting() {\n    for (SpringApplicationRunListener listener : this.listeners) {\n        try {\n            listener.starting();\n        } catch (Throwable ex) {\n            // 记录错误但继续执行其他监听器\n            this.log.error(\"RunListener starting failed\", ex);\n        }\n    }\n}\n```\n\n## 总结\n\n`getRunListeners` 方法体现了 Spring Boot 的**事件驱动架构**和**扩展性设计**：\n\n### 核心价值：\n1. **统一加载机制**：通过 `spring.factories` 自动发现和加载监听器\n2. **生命周期管理**：在应用启动的关键节点发布事件\n3. **批量操作封装**：通过组合模式简化多监听器管理\n4. **扩展性强**：允许用户自定义监听器介入启动流程\n\n### 在启动流程中的作用：\n- **事件发布桥梁**：连接 SpringApplication 和具体的事件监听器\n- **解耦设计**：将启动逻辑与事件处理分离\n- **可观测性**：通过监听器可以监控和跟踪启动过程\n\n这个方法是 Spring Boot **\"开箱即用\"但\"高度可扩展\"** 设计哲学的典型体现。","headings":[{"level":2,"text":"方法概览","id":"方法概览"},{"level":2,"text":"代码逐行深度解析","id":"代码逐行深度解析"},{"level":3,"text":"1. 定义构造函数参数类型","id":"1.-定义构造函数参数类型"},{"level":3,"text":"2. 加载和实例化监听器","id":"2.-加载和实例化监听器"},{"level":3,"text":"3. 创建监听器组合对象","id":"3.-创建监听器组合对象"},{"level":2,"text":"SpringApplicationRunListeners 类的作用","id":"springapplicationrunlisteners-类的作用"},{"level":3,"text":"1. 批量操作多个监听器","id":"1.-批量操作多个监听器"},{"level":3,"text":"2. 提供统一的日志记录","id":"2.-提供统一的日志记录"},{"level":3,"text":"3. 异常处理","id":"3.-异常处理"},{"level":2,"text":"实际加载的监听器示例","id":"实际加载的监听器示例"},{"level":1,"text":"spring-boot-2.x.x.jar!/META-INF/spring.factories","id":"spring-boot-2.x.x.jar-meta-inf-spring.factories"},{"level":2,"text":"完整的工作流程","id":"完整的工作流程"},{"level":3,"text":"1. 加载阶段","id":"1.-加载阶段"},{"level":3,"text":"2. 在启动流程中的使用","id":"2.-在启动流程中的使用"},{"level":2,"text":"设计模式分析","id":"设计模式分析"},{"level":3,"text":"1. 组合模式（Composite Pattern）","id":"1.-组合模式-composite-pattern"},{"level":3,"text":"2. 观察者模式（Observer Pattern）","id":"2.-观察者模式-observer-pattern"},{"level":3,"text":"3. 工厂方法模式（Factory Method Pattern）","id":"3.-工厂方法模式-factory-method-pattern"},{"level":2,"text":"实际应用场景","id":"实际应用场景"},{"level":3,"text":"自定义运行监听器","id":"自定义运行监听器"},{"level":3,"text":"注册自定义监听器","id":"注册自定义监听器"},{"level":2,"text":"异常处理机制","id":"异常处理机制"},{"level":2,"text":"总结","id":"总结"},{"level":3,"text":"核心价值：","id":"核心价值"},{"level":3,"text":"在启动流程中的作用：","id":"在启动流程中的作用"}],"excerpt":"好的，这是 Spring Boot 事件发布机制中的关键方法，用于获取和封装所有的运行监听器。让我们深入解析这个方法。 方法概览 作用：加载并封装所有 SpringApplicationRunListener 实现，用于在应用启动的生命周期不同阶段发布事件。 返回值：SpringApplicationRunListeners - 运行监听器的组合对象，提供批","isEmpty":false,"wordCount":5137,"updatedAt":"2025-09-27T09:17:35.000Z"};
