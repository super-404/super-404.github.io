window.TECH_DOC = {"id":"6515f647","title":"run方法","group":"springboot","relativePath":"springboot/spring源码阅读/run方法.md","url":"/tech-docs/springboot/spring源码阅读/run方法/","kind":"markdown","markdown":"这是 **Spring Boot 应用启动的核心方法**，包含了整个应用从启动到运行的全流程。让我们逐部分详细解析这个重要的 `run` 方法。\n\n## 方法概览\n\n**作用**：启动整个 Spring Boot 应用，创建并刷新 ApplicationContext，返回完全初始化的应用上下文。\n\n**返回值**：`ConfigurableApplicationContext` - 配置好的应用上下文（IoC 容器）\n\n---\n\n## 代码逐部分深度解析\n\n### 1. 启动计时和初始化\n```java\nStopWatch stopWatch = new StopWatch();\nstopWatch.start();\nConfigurableApplicationContext context = null;\nCollection\u003cSpringBootExceptionReporter> exceptionReporters = new ArrayList\u003c>();\n```\n\n- **`StopWatch`**: Spring 的工具类，用于测量执行时间\n- **`context`**: 应用上下文，初始为 null，在后续创建\n- **`exceptionReporters`**: 异常报告器集合，用于启动失败时的错误处理\n\n### 2. 基础配置\n```java\nconfigureHeadlessProperty();\nSpringApplicationRunListeners listeners = getRunListeners(args);\nlisteners.starting();\n```\n\n- **`configureHeadlessProperty()`**: 设置 Java AWT 的 headless 模式，确保在服务器环境（无图形界面）也能正常工作\n- **`getRunListeners(args)`**: 从 `spring.factories` 加载 `SpringApplicationRunListener` 实现\n- **`listeners.starting()`**: 发布 `ApplicationStartingEvent` 事件，通知监听器应用开始启动\n\n### 3. 环境准备\n```java\nApplicationArguments applicationArguments = new DefaultApplicationArguments(args);\nConfigurableEnvironment environment = prepareEnvironment(listeners, applicationArguments);\nconfigureIgnoreBeanInfo(environment);\nBanner printedBanner = printBanner(environment);\n```\n\n- **`ApplicationArguments`**: 封装命令行参数，提供便捷的访问接口\n- **`prepareEnvironment()`**: **关键步骤** - 创建和配置环境（Profiles、配置文件、命令行参数等）\n- **`configureIgnoreBeanInfo()`**: 配置 BeanInfo 忽略，优化性能\n- **`printBanner()`**: 打印 Spring Boot 启动 Banner（就是那个大大的 Spring 标志）\n\n### 4. 创建应用上下文\n```java\ncontext = createApplicationContext();\nexceptionReporters = getSpringFactoriesInstances(SpringBootExceptionReporter.class,\n        new Class[] { ConfigurableApplicationContext.class }, context);\n```\n\n- **`createApplicationContext()`**: 根据应用类型（Servlet/Reactive/None）创建对应的 ApplicationContext\n- **`exceptionReporters`**: 加载异常报告器，用于优雅地处理启动失败\n\n### 5. 上下文准备和刷新（最核心的部分）\n```java\nprepareContext(context, environment, listeners, applicationArguments, printedBanner);\nrefreshContext(context);\nafterRefresh(context, applicationArguments);\n```\n\n这三步是 **Spring Boot 启动的魔法所在**：\n\n#### `prepareContext()`\n- 将环境设置到上下文中\n- 执行 Bean 定义后置处理\n- 加载所有源（主配置类、其他配置等）\n- 发布 `ApplicationPreparedEvent` 事件\n\n#### `refreshContext()` - **最最关键的方法**\n```java\n// 内部调用 context.refresh()，包含：\n// 1. BeanFactory 准备\n// 2. 执行 BeanFactoryPostProcessor（自动配置在这里发生！）\n// 3. 注册 BeanPostProcessor\n// 4. 初始化消息源和事件\n// 5. 创建内嵌 Web 服务器（Tomcat/Netty/Jetty）\n// 6. 实例化所有非懒加载的单例 Bean（依赖注入在这里完成）\n// 7. 完成刷新，发布 ContextRefreshedEvent\n```\n\n#### `afterRefresh()`\n- 刷新后的钩子方法，默认空实现，可用于自定义扩展\n\n### 6. 启动完成处理\n```java\nstopWatch.stop();\nif (this.logStartupInfo) {\n    new StartupInfoLogger(this.mainApplicationClass).logStarted(getApplicationLog(), stopWatch);\n}\nlisteners.started(context);\ncallRunners(context, applicationArguments);\n```\n\n- **计时停止**：计算总启动时间\n- **启动日志**：记录启动完成信息\n- **`listeners.started()`**：发布 `ApplicationStartedEvent` 事件\n- **`callRunners()`**：执行所有 `ApplicationRunner` 和 `CommandLineRunner` Bean\n\n### 7. 运行状态和异常处理\n```java\ntry {\n    listeners.running(context);  // 发布 ApplicationReadyEvent\n}\ncatch (Throwable ex) {\n    handleRunFailure(context, ex, exceptionReporters, null);\n    throw new IllegalStateException(ex);\n}\nreturn context;\n```\n\n- **`listeners.running()`**：发布 `ApplicationReadyEvent`，表示应用已完全就绪\n- **异常处理**：如果任何步骤失败，调用 `handleRunFailure` 进行清理并发布失败事件\n\n---\n\n## 完整启动流程图示\n\n```mermaid\ngraph TD\n    A[开始启动] --> B[启动计时器]\n    B --> C[配置Headless模式]\n    C --> D[加载RunListeners]\n    D --> E[发布ApplicationStartingEvent]\n    E --> F[准备环境Environment]\n    F --> G[打印Banner]\n    G --> H[创建ApplicationContext]\n    H --> I[加载异常报告器]\n    I --> J[准备上下文]\n    J --> K[**核心: 刷新上下文**]\n    K --> L[afterRefresh钩子]\n    L --> M[停止计时器]\n    M --> N[记录启动日志]\n    N --> O[发布ApplicationStartedEvent]\n    O --> P[执行Runners]\n    P --> Q[发布ApplicationReadyEvent]\n    Q --> R[返回ApplicationContext]\n    \n    E --> E1[加载配置文件]\n    E --> E2[处理命令行参数]\n    E --> E3[激活Profiles]\n    \n    K --> K1[BeanFactory准备]\n    K --> K2[执行BeanFactoryPostProcessor\u003cbr>**自动配置发生在这里**]\n    K --> K3[注册BeanPostProcessor]\n    K --> K4[创建内嵌Web服务器]\n    K --> K5[实例化单例Bean\u003cbr>**依赖注入完成**]\n    \n    style K fill:#e1f5fe\n    style K2 fill:#f3e5f5\n    style K5 fill:#f3e5f5\n```\n\n---\n\n## 事件发布序列\n\nSpring Boot 通过事件机制提供了丰富的扩展点：\n\n1. **`ApplicationStartingEvent`**：应用开始启动\n2. **`ApplicationEnvironmentPreparedEvent`**：环境准备完成\n3. **`ApplicationPreparedEvent`**：上下文准备完成，但未刷新\n4. **`ContextRefreshedEvent`**：上下文刷新完成（Spring Framework 事件）\n5. **`ApplicationStartedEvent`**：应用启动完成，Runners 即将执行\n6. **`ApplicationReadyEvent`**：应用完全就绪，可处理请求\n\n---\n\n## 实际应用示例\n\n### 自定义 Runner\n```java\n@Component\npublic class MyApplicationRunner implements ApplicationRunner {\n    @Override\n    public void run(ApplicationArguments args) {\n        // 应用启动后执行的初始化逻辑\n        System.out.println(\"应用启动完成，执行自定义初始化...\");\n    }\n}\n```\n\n### 事件监听器\n```java\n@Component\npublic class MyApplicationListener {\n    @EventListener\n    public void handleApplicationReady(ApplicationReadyEvent event) {\n        // 应用完全就绪后的处理\n        System.out.println(\"应用已就绪，可以开始处理请求！\");\n    }\n}\n```\n\n---\n\n## 设计思想总结\n\n### 1. **模板方法模式**\n整个 `run` 方法定义了一个标准的启动流程，每个步骤都可以被重写或扩展。\n\n### 2. **事件驱动架构**\n通过多个事件节点，允许在启动过程的不同阶段插入自定义逻辑。\n\n### 3. **失败恢复机制**\n完善的异常处理确保启动失败时能够优雅地清理资源。\n\n### 4. **模块化设计**\n每个步骤职责单一，便于理解和维护。\n\n### 5. **开箱即用**\n默认实现提供了完整的功能，同时保留充分的扩展性。\n\n这个 `run` 方法是 Spring Boot **\"约定优于配置\"** 理念的完美体现，它将复杂的启动过程封装在一个简单的方法调用中，让开发者可以专注于业务逻辑。","headings":[{"level":2,"text":"方法概览","id":"方法概览"},{"level":2,"text":"代码逐部分深度解析","id":"代码逐部分深度解析"},{"level":3,"text":"1. 启动计时和初始化","id":"1.-启动计时和初始化"},{"level":3,"text":"2. 基础配置","id":"2.-基础配置"},{"level":3,"text":"3. 环境准备","id":"3.-环境准备"},{"level":3,"text":"4. 创建应用上下文","id":"4.-创建应用上下文"},{"level":3,"text":"5. 上下文准备和刷新（最核心的部分）","id":"5.-上下文准备和刷新-最核心的部分"},{"level":3,"text":"6. 启动完成处理","id":"6.-启动完成处理"},{"level":3,"text":"7. 运行状态和异常处理","id":"7.-运行状态和异常处理"},{"level":2,"text":"完整启动流程图示","id":"完整启动流程图示"},{"level":2,"text":"事件发布序列","id":"事件发布序列"},{"level":2,"text":"实际应用示例","id":"实际应用示例"},{"level":3,"text":"自定义 Runner","id":"自定义-runner"},{"level":3,"text":"事件监听器","id":"事件监听器"},{"level":2,"text":"设计思想总结","id":"设计思想总结"},{"level":3,"text":"1. 模板方法模式","id":"1.-模板方法模式"},{"level":3,"text":"2. 事件驱动架构","id":"2.-事件驱动架构"},{"level":3,"text":"3. 失败恢复机制","id":"3.-失败恢复机制"},{"level":3,"text":"4. 模块化设计","id":"4.-模块化设计"},{"level":3,"text":"5. 开箱即用","id":"5.-开箱即用"}],"excerpt":"这是 Spring Boot 应用启动的核心方法，包含了整个应用从启动到运行的全流程。让我们逐部分详细解析这个重要的 run 方法。 方法概览 作用：启动整个 Spring Boot 应用，创建并刷新 ApplicationContext，返回完全初始化的应用上下文。 返回值：ConfigurableApplicationContext - 配置好的应用上下","isEmpty":false,"wordCount":5348,"updatedAt":"2025-09-27T09:17:40.000Z"};
